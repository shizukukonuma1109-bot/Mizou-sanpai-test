<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        /* 🌍 画面の中央に綺麗に配置 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: sans-serif;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📦 タイトルとお言葉コンテナをまとめる外枠 */
        #wrapper {
            max-width: 390px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px; /* 上下の箱のすき間 */
        }

        /* 🏷️ 新設：独立したタイトル専用コンテナ */
        #title-container {
            background: rgba(255, 255, 255, 0.5); /* 👈 透明度 0.5 */
            padding: 12px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #444;
        }

        /* 📜 メインコンテナ */
        #quote-container {
            background: rgba(255, 255, 255, 0.5); /* 👈 透明度 0.5 */
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            box-sizing: border-box;
            max-height: 75vh; /* タイトルの分、高さを少し調整 */
            overflow-y: auto;
        }

        .lang-block {
            margin-bottom: 0;
            line-height: 1.8;
        }

        .lang-japanese {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }

        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
        
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }
    </style>
</head>
<body>

    <div id="wrapper">
        
        <div id="title-container">Message from Shinso Ito</div>

        <div id="quote-container">
            <div id="content-body">読み込み中...</div>
            
            <br>
            <button id="action-btn" onclick="toggleForm()">💌 感謝のメッセージを送る</button>
            
            <div id="message-form-container">
                <form id="thank-you-form" method="POST">
                    <input type="text" name="bukai" placeholder="部会 (任意)">
                    <input type="text" name="kei" placeholder="経 (任意)">
                    <input type="text" name="name" placeholder="お名前 (任意)">
                    <textarea name="message" rows="4" placeholder="感謝のメッセージをご記入ください..." required></textarea>
                    <br>
                    <button type="submit" id="submit-btn">送信する</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // 🌸 聖句データ（23メッセージ）
        const quotesData = [
            { jp: "いつも一緒。 いつもそばにいてくださる。それが、みほとけ。つらく、せつなく、自信をなくしかけたとき、眼を閉じて思い出してみてください。<br><br> 自分は、みほとけとともにある――と。", image: "bg1.jpg" },
            { jp: "あなたのやさしさにみほとけの“こころ”を知りました。ありがとう。", image: "bg2.jpg" },
            { jp: "言葉でも身ぶりでも会話はとても大切です。「おはようございます」「こんにちは」<br><br>まずは、あいさつから。", image: "bg3.jpg" },
            { jp: "「がんばろう」と思えたこと、すばらしいですね。けれども急にしたら疲れてしまうかもしれません。 無理せず、少しずつ。<br><br> できることから始めてみませんか。", image: "bg4.jpg" },
            { jp: "みほとけは みなさんの心の中におわします。やさしくしたい たすけたい 正直でいたい そういう心、ちょっとはありますよね。<br><br> その“ちょっと”が、小さなみほとけです。", image: "bg5.jpg" },
            { jp: "反省できるひとは、きれいな心の持ち主です。", image: "bg6.jpg" },
            { jp: "姿やカタチをきれいにするのはとてもよいこと。それに心のこもった言葉や態度が加わればもっと美しくなれるのです。", image: "bg7.jpg" },
            { jp: "楽しそう、素直そう、親切でやさしそう――「あのひとって、よいひとね」と言われるような、よいところ、 あなたにも、必ずあるはず。", image: "bg8.jpg" },
            { jp: "努力しよう、よくしたいと思えること。それも“しあわせ”。", image: "bg9.jpg" },
            { jp: "ときには「はーっ」と息をつきたくなること、ありますよね。私もあります。そんなときは、深呼吸して 酸素をいっぱい体の中に入れて…。 <br><br>「さあ、またがんばりましょう」", image: "bg10.jpg" },
            { jp: "ある時、ある場所で、一緒にすごすひとは、みほとけがめぐりあわせてくれた大事なひとかもしれません。", image: "bg11.jpg" },
            { jp: "「ありがたいな」と思うたび、心はかがやいていきます。", image: "bg12.jpg" },
            { jp: "「こんな自分はだめだ・・・」とひっこまないで。 こんな自分を、みほとけは期待しています。 こんな自分を、必要としているひとがいるのです。前向きに、プラス思考で。<br><br> 力をだせたら、後悔はいりません。", image: "bg13.jpg" },
            { jp: "おなじ経験をしなければ ひとの気持ちにはなれないのでしょうか。私は、そうは思いません。 苦しみや悲しみをいやしたい 少しでもわかちあいたい その誠意があれば、つながります。", image: "bg14.jpg" },
            { jp: "思いやりとは、そのひとの心になっていくこと。", image: "bg15.jpg" },
            { jp: "私も、おちこむことがあります。けれども、そんなときは自分にこう言いきかせてきりかえるのです。 「しかたがない、終わったこと。 次は気をつけよう！」", image: "bg16.jpg" },
            { jp: "自分のことをよく考えるのは大事。ひとのこと、を自分ごととして考えるのはもっと大事。やさしく、あたたかく、ささえ、つくしていくひとは<br><br>みほとけから大事にされます。", image: "bg17.jpg" },
            { jp: "生まれてから今まで、どれだけ多くのひとがあなたを助け 愛情をかけてくれたか、忘れないで。 みんな、家族にとって、仲間にとって、私にとって、大切な命です。", image: "bg18.jpg" },
            { jp: "ひとは誰も、完ぺきではありません。", image: "bg19.jpg" },
            { jp: "ものを大切にしていくこと。すべてに命があります。大切にすれば、大切にしたものに守られます。自然と自分、道具とひと、みな一体です。", image: "bg20.jpg" },
            { jp: "ひととのコミュニケーションで悩むこと、ありませんか。そんなときは相手の言うことに耳をかたむけてみましょう。自分の考えを述べるのは、そのあとで。そうすれば距離を縮めることができます。", image: "bg21.jpg" },
            { jp: "なごやかな、あたたかいほほえみで接する。これを、和顔施（わがんせ）といいます。みなさんも、笑顔で迎えられたら、うれしいでしょう？仏教の重要な修行のひとつです。", image: "bg22.jpg" },
            { jp: "よいことをするにも はじめは“意識”しておこなわないと 続かないかもしれません。何度も自分に言いきかせていくうちに 自然と、よいことが“習慣”になります。そのとき、ステキな自分が見つかりますよ。", image: "bg23.jpg" }
        ];

        // 🔗 GAS Web App URL
        const gasUrl = 'https://script.google.com/macros/s/AKfycbz27VJEIDm_tBf4iYYj5HYLsz7suTl1EXopg-vAhFeWoi1-aSanvAtIF3AZMTSmDv93/exec';

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        window.onload = function() {
            try {
                refreshQuote();
                sendAutoAccessLog(); // バックグラウンド自動アクセス送信
            } catch (error) {
                console.error("Initialization error:", error);
            }
        };

        function refreshQuote() {
            if (quotesData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            const selectedSet = quotesData[randomIndex];
            document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
            
            let htmlContent = "";
            if(selectedSet.jp) htmlContent += `<div class="lang-block lang-japanese">${selectedSet.jp}</div>`;
            document.getElementById("content-body").innerHTML = htmlContent;
        }

        // 📡 自動アクセスログ送信
        function sendAutoAccessLog() {
            const payload = { 
                type: "access", 
                lang: "jp",       
                status: "Auto",   
                country: "Auto",  
                deviceId: getOrCreateDeviceId()
            };

            fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            })
            .catch((err) => { console.error("Auto log transmission failed:", err); });
        }

        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        // 📤 メッセージフォーム送信処理
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { 
                submitBtn.innerText = "Sending..."; 
                submitBtn.disabled = true; 
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData);
            
            payload.type = "message";
            payload.lang = "jp"; 
            payload.status = "Auto";
            payload.country = "Auto";
            payload.deviceId = getOrCreateDeviceId();

            fetch(gasUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                alert("Your message has been sent.\nThank you.");
                form.reset();
                document.getElementById('message-form-container').style.display = 'none';
                const actionBtn = document.getElementById('action-btn');
                if (actionBtn) {
                    actionBtn.innerText = "💌 Sent";
                    actionBtn.style.display = 'inline-block';
                    actionBtn.disabled = true;
                    actionBtn.style.backgroundColor = "#ccc";
                    actionBtn.style.boxShadow = "none";
                }
            })
            .catch((error) => {
                alert("A connection error occurred. Please try again.");
                if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
