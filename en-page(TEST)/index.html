<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIZOU-SANPAI Check-In</title>
  <style>
    /* --- Base Design --- */
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: #ffffff;
      width: 90%;
      max-width: 500px;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      box-sizing: border-box;
    }

    /* --- Step Controls --- */
    .step {
      display: none;
    }
    .step.active {
      display: block;
    }

    /* --- Custom UI Components --- */
    .modal-title {
      font-size: 26px;
      font-weight: bold;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 30px;
      color: #1e293b;
    }

    .country-label {
      font-size: 28px;
      font-weight: bold;
      display: block;
      text-align: center;
      margin-top: 25px;
      margin-bottom: 20px;
      color: #334155;
    }

    /* Horizontal Layout for Radio Buttons */
    .radio-group {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-bottom: 35px;
    }

    .radio-label {
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: #475569;
    }

    /* Enlarged Radio Input */
    .radio-label input[type="radio"] {
      width: 26px;
      height: 26px;
      cursor: pointer;
      margin: 0;
    }

    /* Button Layout */
    .button-group {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    button {
      font-size: 22px;
      font-weight: bold;
      padding: 16px 35px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
      transition: all 0.2s ease;
      flex: 1;
    }

    button:active {
      transform: scale(0.98);
    }

    /* MEMBER Button Style */
    .btn-member {
      background-color: #475569;
      color: #ffffff;
    }
    .btn-member:hover {
      background-color: #334155;
    }

    /* VISITOR Button Style (Customized to Light Blue) */
    .btn-visitor {
      background-color: #add8e6;
      color: #1e293b;
    }
    .btn-visitor:hover {
      background-color: #9accdb;
    }

    /* --- Form Style for Step 2 (Words of Gratitude) --- */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #475569;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
    }
    .form-group textarea {
      resize: none;
      height: 100px;
    }
    .btn-submit {
      background-color: #10b981;
      color: white;
      width: 100%;
      margin-top: 10px;
    }
    .btn-submit:hover {
      background-color: #059669;
    }
    .btn-skip {
      background-color: #e2e8f0;
      color: #475569;
      width: 100%;
      margin-top: 10px;
      font-size: 16px;
      padding: 10px;
    }

    /* --- Loading Spinner Overlay --- */
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.8);
      z-index: 999;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      color: #1e293b;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="step1" class="step active">
      <div class="modal-title">Welcome to<br>🪷ーMIZOU-SANPAIー🪷<br>Please Check In</div>
      
      <span class="country-label">Where are you from?</span>
      
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="country" value="Thailand" checked> Thailand
        </label>
        <label class="radio-label">
          <input type="radio" name="country" value="Other"> Other
        </label>
      </div>
      
      <div class="button-group">
        <button class="btn-member" onclick="handleCheckIn('Member')">MEMBER</button>
        <button class="btn-visitor" onclick="handleCheckIn('Visitor')">VISITOR</button>
      </div>
    </div>

    <div id="step2" class="step">
      <div class="modal-title">🪷 Words of Gratitude 🪷</div>
      <p style="text-align: center; color: #64748b; margin-bottom: 25px;">Please leave your message if you would like.</p>
      
      <div class="form-group">
        <label>Division (Bukai)</label>
        <input type="text" id="bukai" placeholder="e.g. Sales Dept">
      </div>
      <div class="form-group">
        <label>Lineage (Kei)</label>
        <input type="text" id="kei" placeholder="e.g. Tokyo Line">
      </div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" placeholder="Your Name">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="message" placeholder="Thank you for today..."></textarea>
      </div>
      
      <button class="btn-submit" onclick="handleMessageSubmit()">Submit Message</button>
      <button class="btn-skip" onclick="resetForm()">Skip & Finish</button>
    </div>

    <div id="step3" class="step" style="text-align: center;">
      <div style="font-size: 60px; margin-bottom: 20px;">🪷</div>
      <div class="modal-title" style="margin-bottom: 10px;">Thank You Very Much</div>
      <p style="color: #64748b;">Your check-in has been successfully registered.</p>
    </div>

  </div>

  <div id="loadingOverlay" class="overlay">Processing... Please wait.</div>

  <script>
    // ⚠️ パブリッシュした最新のGASのWebアプリURLをここに貼り付けてください
    const gasUrl = 'YOUR_GAS_WEB_APP_URL_HERE';

    // 選択された状態を一時保存する変数
    let currentStatus = '';
    let currentCountry = '';

    // ローディングの表示/非表示
    function showLoading(show) {
      document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }

    // 画面切り替え
    function goToStep(stepNumber) {
      document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
      document.getElementById('step' + stepNumber).classList.add('active');
    }

    // [Step 1] MEMBER / VISITOR ボタンを押したときの処理
    function handleCheckIn(status) {
      currentStatus = status;
      currentCountry = document.querySelector('input[name="country"]:checked').value;

      showLoading(true);

      // GASへAccessデータを送信
      fetch(gasUrl, {
        method: 'POST',
        mode: 'no-cors', // CORSエラー回避のための設定
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'access',
          status: currentStatus,
          country: currentCountry
        })
      })
      .then(() => {
        showLoading(false);
        // 送信成功したらStep 2（メッセージ画面）へ移動
        goToStep(2);
      })
      .catch(error => {
        showLoading(false);
        alert('Transmission failed. Please try again.');
        console.error('Error:', error);
      });
    }

    // [Step 2] 感謝メッセージを送信したときの処理
    function handleMessageSubmit() {
      const bukai = document.getElementById('bukai').value;
      const kei = document.getElementById('kei').value;
      const name = document.getElementById('name').value;
      const message = document.getElementById('message').value;

      showLoading(true);

      // GASへMessageデータを送信
      fetch(gasUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'message',
          bukai: bukai,
          kei: kei,
          name: name,
          message: message,
          status: currentStatus,
          country: currentCountry
        })
      })
      .then(() => {
        showLoading(false);
        showThankYouAndReset();
      })
      .catch(error => {
        showLoading(false);
        alert('Transmission failed. Please try again.');
        console.error('Error:', error);
      });
    }

    // 完了画面を表示して数秒後に最初の画面に戻す
    function showThankYouAndReset() {
      goToStep(3);
      setTimeout(() => {
        resetForm();
      }, 4000); // 4秒間サンキュー画面を表示
    }

    // フォームのリセットと初期化
    function resetForm() {
      document.getElementById('bukai').value = '';
      document.getElementById('kei').value = '';
      document.getElementById('name').value = '';
      document.getElementById('message').value = '';
      document.querySelector('input[name="country"][value="Thailand"]').checked = true;
      currentStatus = '';
      currentCountry = '';
      goToStep(1);
    }
  </script>
</body>
</html>
