<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        /* 🌍 全体を画面中央に配置 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: sans-serif;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📜 メインコンテナ */
        #quote-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 390px; 
            width: 100%;
            box-sizing: border-box;
            max-height: 85vh; 
            overflow-y: auto;
        }

        .lang-block {
            margin-bottom: 0;
            line-height: 1.8;
        }

        .lang-english {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }

        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
        
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }
    </style>
</head>
<body>

    <div id="quote-container">
        <div id="content-body">Loading...</div>
        
        <br>
        <button id="action-btn" onclick="toggleForm()">💌 Message of Gratitude</button>
        
        <div id="message-form-container">
            <form id="thank-you-form" method="POST">
                <input type="text" name="bukai" placeholder="Division (Optional)">
                <input type="text" name="kei" placeholder="Lineage (Optional)">
                <input type="text" name="name" placeholder="Name (Optional)">
                <textarea name="message" rows="4" placeholder="Please enter your message..." required></textarea>
                <br>
                <button type="submit" id="submit-btn">Submit</button>
            </form>
        </div>
    </div>

    <script>
        // 🌸 聖句データ
        const quotesData = [
            { en: "Always together. Always by your side.<br>That is Buddha.<br>When you feel down, sad,<br>or lose confidence,<br>close your eyes and remember.<br>You are always with Buddha.", image: "bg1.jpg" },
            { en: "I came to know the \"heart\" of Buddha through your kindness. Thank you.", image: "bg2.jpg" },
            { en: "Communication is very important, whether through words or gestures.<br>\"Good morning,\" \"Hello\"<br><br>Let's start with a greeting.", image: "bg3.jpg" },
            { en: "It's wonderful that you felt<br>motivated to do your best.<br>However, if you push yourself <br>too hard suddenly,you might get tired.<br>Don't overdo it, take it step by step.<br>Why not start with what you can do?", image: "bg4.jpg" },
            { en: "Buddha resides within everyone's heart.<br>To be kind, to help, to be honest—<br>you have a little bit of that heart, <br>don't you?<br>That \"little bit\" is a small Buddha.", image: "bg5.jpg" },
            { en: "A person who can reflect on themselves<br>has a beautiful heart.", image: "bg6.jpg" },
            { en: "Making your appearance neat and beautiful is<br>very good. In addition, if you add heartfelt<br>words and attitude,<br>you can become even more beautiful.", image: "bg7.jpg" },
            { en: "Cheerful, truthful, kind, warm—<br>\"That person is so nice,\"<br>someone might say.<br>You surely have such good qualities too,<br>each of us has something<br>special to offer.", image: "bg8.jpg" },
            { en: "Being able to desire to make an effort and improve yourself—<br>that itself is \"happiness.\"", image: "bg9.jpg" },
            { en: "Sometimes you just want to take a deep breath and say<br>\"Phew,\" don't you?<br>I do too. At times like that,<br>take a deep breath, fill your body with oxygen...<br><br>\"Now, let's do our best again.\"", image: "bg10.jpg" },
            { en: "A person you spend time with at<br> a certain time and place might be<br> an important person Buddha<br> brought into your life.", image: "bg11.jpg" },
            { en: "Every time you feel grateful,<br>your heart shines brighter.", image: "bg12.jpg" },
            { en: "Don't step back thinking,<br>\"I'm no good...\"<br>Buddha expects much from you just as you are. There is someone who needs you<br>just as you are.<br>Be forward-looking and think positively.<br><br>If you do your best, there is no need for regret.", image: "bg13.jpg" },
            { en: "Do we have to go through<br> the same experience<br> to understand someone's feelings?<br>I don't think so.<br>As long as there is sincerity to ease suffering or sadness,<br>and to share it even a little, we can connect.", image: "bg14.jpg" },
            { en: "Compassion means<br>putting yourself in another person's heart.", image: "bg15.jpg" },
            { en: "I get depressed too.<br>But at times like that, I tell myself<br>to switch my mindset:<br>\"It can't be helped, it's already over.<br>Next time I'll be careful!\"", image: "bg16.jpg" },
            { en: "Thinking about yourself is important.<br>Thinking about others <br>as your own matter<br>is even more important.<br>A person who is kind, warm, supportive,<br>and dedicated to others is <br>cherished by Buddha.", image: "bg17.jpg" },
            { en: "Remember how many people have helped you and given you love<br>since you were born until now. Everyone's life is precious<br>to their family, their friends, and to me.", image: "bg18.jpg" },
            { en: "No one is perfect.", image: "bg19.jpg" },
            { en: "Cherish things. Everything has life.<br>If you cherish them, you will be protected by the things you cherished.<br>Nature and yourself, tools and people—<br>all are one.", image: "bg20.jpg" },
            { en: "Do we have to go through the same experience<br>to understand someone's feelings?<br>I don't think so.<br>As long as there is sincerity to ease suffering or sadness,<br>and to share it even a little, we can connect.", image: "bg21.jpg" },
            { en: "Welcoming others with a gentle,<br> warm smile is called<br>\"Waganse\" (offering of a smiling face).<br>You would be happy to be welcomed with a smile, wouldn't you?<br>It is one of the important practices<br>in Buddhism.", image: "bg22.jpg" },
            { en: "Doing good deeds may require conscious effort at first<br>to keep it going. As you keep telling yourself over and over,<br>doing good will naturally become a \"habit.\"<br>At that moment, you will find a wonderful version of yourself.", image: "bg23.jpg" }
        ];

        // 🔗 GAS Web App URL (★作成したGASのWebアプリURLに差し替えてください★)
        const gasUrl = 'https://script.google.com/macros/s/AKfycbz27VJEIDm_tBf4iYYj5HYLsz7suTl1EXopg-vAhFeWoi1-aSanvAtIF3AZMTSmDv93/exec';

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        window.onload = function() {
            try {
                refreshQuote();
                sendAutoAccessLog(); // バックグラウンド自動アクセス送信
            } catch (error) {
                console.error("Initialization error:", error);
            }
        };

        function refreshQuote() {
            if (quotesData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            const selectedSet = quotesData[randomIndex];
            document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
            
            let htmlContent = "";
            if(selectedSet.en) htmlContent += `<div class="lang-block lang-english">${selectedSet.en}</div>`;
            document.getElementById("content-body").innerHTML = htmlContent;
        }

        // 📡 自動アクセスログ送信 (no-corsを取り除き、テキスト型でPOST)
        function sendAutoAccessLog() {
            const payload = { 
                type: "access", 
                lang: "en",       // 👈 英語のQRコードページであることを明示
                status: "Auto",   
                country: "Auto",  
                deviceId: getOrCreateDeviceId()
            };

            fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            })
            .catch((err) => { console.error("Auto log transmission failed:", err); });
        }

        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        // 📤 メッセージフォーム送信処理
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { 
                submitBtn.innerText = "Sending..."; 
                submitBtn.disabled = true; // 送信ボタンを即時無効化（連打防止）
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData);
            
            payload.type = "message";
            payload.lang = "en"; // 👈 英語のQRコードページであることを明示
            payload.status = "Auto";
            payload.country = "Auto";
            payload.deviceId = getOrCreateDeviceId();

            fetch(gasUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                alert("Your message has been sent.<br>Thank you.");
                form.reset();
                document.getElementById('message-form-container').style.display = 'none';
                const actionBtn = document.getElementById('action-btn');
                if (actionBtn) {
                    actionBtn.innerText = "💌 Sent";
                    actionBtn.style.display = 'inline-block';
                    actionBtn.disabled = true;
                    actionBtn.style.backgroundColor = "#ccc";
                    actionBtn.style.boxShadow = "none";
                }
            })
            .catch((error) => {
                alert("A connection error occurred. Please try again.");
                if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
