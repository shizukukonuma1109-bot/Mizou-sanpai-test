<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        /* 🌍 画面の中央に綺麗に配置 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: sans-serif;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📦 タイトルとお言葉コンテナをまとめる外枠 */
        #wrapper {
            max-width: 390px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px; /* 上下の箱のすき間 */
        }

        /* 🏷️ 新設：独立したタイトル専用コンテナ */
        #title-container {
            background: rgba(255, 255, 255, 0.5); /* 👈 透明度 0.5 */
            padding: 12px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #444;
        }

        /* 📜 メインコンテナ */
        #quote-container {
            background: rgba(255, 255, 255, 0.5); /* 👈 透明度 0.5 */
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            box-sizing: border-box;
            max-height: 75vh; /* タイトルの分、高さを少し調整 */
            overflow-y: auto;
        }

        .lang-block {
            margin-bottom: 0;
            line-height: 1.8;
        }

        .lang-japanese {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }

        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
        
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }
    </style>
</head>
<body>

    <div id="wrapper">
        
        <div id="title-container">Message from Shinso Ito</div>

        <div id="quote-container">
            <div id="content-body">読み込み中...</div>
            
            <br>
            <button id="action-btn" onclick="toggleForm()">💌 感謝のメッセージを送る</button>
            
            <div id="message-form-container">
                <form id="thank-you-form" method="POST">
                    <input type="text" name="bukai" placeholder="部会 (任意)">
                    <input type="text" name="kei" placeholder="経 (任意)">
                    <input type="text" name="name" placeholder="お名前 (任意)">
                    <textarea name="message" rows="4" placeholder="感謝のメッセージをご記入ください..." required></textarea>
                    <br>
                    <button type="submit" id="submit-btn">送信する</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // 🌸 聖句データ（23メッセージ）
        const quotesData = [
            { jp: "いつも一緒。<br>いつもそばにいてくださる。<br>それが、みほとけ。<br>つらく、せつなく、<br>自信をなくしかけたとき、<br>眼を閉じて思い出してみてください。<br><br> 自分は、みほとけとともにある――と。", image: "bg1.jpg" },
            { jp: "あなたのやさしさに<br>みほとけの“こころ”を知りました。ありがとう。", image: "bg2.jpg" },
            { jp: "言葉でも身ぶりでも会話はとても大切です。<br>「おはようございます」「こんにちは」<br><br>まずは、あいさつから。", image: "bg3.jpg" },
            { jp: "「がんばろう」と思えたこと、<br>すばらしいですね。<br>けれども急にしたら<br>疲れてしまうかもしれません。<br> 無理せず、少しずつ。<br><br> できることから始めてみませんか。", image: "bg4.jpg" },
            { jp: "みほとけはみなさんの心の中におわします。<br>やさしくしたい たすけたい 正直でいたい<br>そういう心、ちょっとはありますよね。<br><br> その“ちょっと”が、小さなみほとけです。", image: "bg5.jpg" },
            { jp: "反省できるひとは、<br>きれいな心の持ち主です。", image: "bg6.jpg" },
            { jp: "姿やカタチをきれいにするのは<br>とてもよいこと。<br>それに心のこもった言葉や態度が加われば<br>もっと美しくなれるのです。", image: "bg7.jpg" },
            { jp: "楽しそう、素直そう、親切でやさしそう―<br>「あのひとって、よいひとね」と<br>言われるような、よいところ、<br>あなたにも、必ずあるはず。", image: "bg8.jpg" },
            { jp: "努力しよう、よくしたいと思えること。<br>それも“しあわせ”。", image: "bg9.jpg" },
            { jp: "ときには「はーっ」と<br>息をつきたくなること、ありますよね。<br>私もあります。<br>そんなときは、深呼吸して<br>酸素をいっぱい体の中に入れて…。 <br><br>「さあ、またがんばりましょう」", image: "bg10.jpg" },
            { jp: "ある時、ある場所で、一緒にすごす<br>ひとは、みほとけがめぐりあわせてくれた<br>大事なひとかもしれません。", image: "bg11.jpg" },
            { jp: "「ありがたいな」と思うたび、<br>心はかがやいていきます。", image: "bg12.jpg" },
            { jp: "「こんな自分はだめだ・・・」と<br>ひっこまないで。 こんな自分を、<br>みほとけは期待しています。<br>こんな自分を、必要としているひとが<br>いるのです。前向きに、プラス思考で。<br><br> 力をだせたら、後悔はいりません。", image: "bg13.jpg" },
            { jp: "おなじ経験をしなければ<br>ひとの気持ちにはなれないのでしょうか。<br>私は、そうは思いません。<br>苦しみや悲しみをいやしたい<br>少しでもわかちあいたい<br>その誠意があれば、つながります。", image: "bg14.jpg" },
            { jp: "思いやりとは、<br>そのひとの心になっていくこと。", image: "bg15.jpg" },
            { jp: "私も、おちこむことがあります。<br>けれども、そんなときは自分に<br>こう言いきかせてきりかえるのです。<br>「しかたがない、終わったこと。<br>次は気をつけよう！」", image: "bg16.jpg" },
            { jp: "自分のことをよく考えるのは大事。<br>ひとのこと、を自分ごととして考えるのは<br>もっと大事。やさしく、あたたかく、<br>ささえ、つくしていくひとは<br>みほとけから大事にされます。", image: "bg17.jpg" },
            { jp: "生まれてから今まで、<br>どれだけ多くのひとがあなたを助け<br>愛情をかけてくれたか、忘れないで。<br>みんな、家族にとって、仲間にとって、<br>私にとって、大切な命です。", image: "bg18.jpg" },
            { jp: "ひとは誰も、<br>完ぺきではありません。", image: "bg19.jpg" },
            { jp: "ものを大切にしていくこと。<br>すべてに命があります。大切にすれば、<br>大切にしたものに守られます。<br>自然と自分、道具とひと、みな一体です。", image: "bg20.jpg" },
            { jp: "ひととのコミュニケーションで<br>悩むこと、ありませんか。<br>そんなときは相手の言うことに<br>耳をかたむけてみましょう。<br>自分の考えを述べるのは、そのあとで。<br>そうすれば距離を縮めることができます。", image: "bg21.jpg" },
            { jp: "なごやかな、あたたかいほほえみで接する<br>これを、和顔施（わがんせ）といいます。<br>みなさんも、笑顔で迎えられたら、<br>うれしいでしょう？<br>仏教の重要な修行のひとつです。", image: "bg22.jpg" },
            { jp: "よいことをするにもはじめは<br>“意識”しておこなわないと<br>続かないかもしれません。<br>何度も自分に言いきかせていくうちに<br>自然と、よいことが“習慣”になります。<br>そのとき、ステキな自分が見つかりますよ。", image: "bg23.jpg" }
        ];

        // 🔗 GAS Web App URL
        const gasUrl = 'https://script.google.com/macros/s/AKfycbz27VJEIDm_tBf4iYYj5HYLsz7suTl1EXopg-vAhFeWoi1-aSanvAtIF3AZMTSmDv93/exec';

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        window.onload = function() {
            try {
                refreshQuote();
                sendAutoAccessLog(); // バックグラウンド自動アクセス送信
            } catch (error) {
                console.error("Initialization error:", error);
            }
        };

        function refreshQuote() {
            if (quotesData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            const selectedSet = quotesData[randomIndex];
            document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
            
            let htmlContent = "";
            if(selectedSet.jp) htmlContent += `<div class="lang-block lang-japanese">${selectedSet.jp}</div>`;
            document.getElementById("content-body").innerHTML = htmlContent;
        }

        // 📡 自動アクセスログ送信
        function sendAutoAccessLog() {
            const payload = { 
                type: "access", 
                lang: "jp",       
                status: "Auto",   
                country: "Auto",  
                deviceId: getOrCreateDeviceId()
            };

            fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            })
            .catch((err) => { console.error("Auto log transmission failed:", err); });
        }

        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        // 📤 メッセージフォーム送信処理
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { 
                submitBtn.innerText = "Sending..."; 
                submitBtn.disabled = true; 
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData);
            
            payload.type = "message";
            payload.lang = "jp"; 
            payload.status = "Auto";
            payload.country = "Auto";
            payload.deviceId = getOrCreateDeviceId();

            fetch(gasUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                alert("Your message has been sent.\nThank you.");
                form.reset();
                document.getElementById('message-form-container').style.display = 'none';
                const actionBtn = document.getElementById('action-btn');
                if (actionBtn) {
                    actionBtn.innerText = "💌 Sent";
                    actionBtn.style.display = 'inline-block';
                    actionBtn.disabled = true;
                    actionBtn.style.backgroundColor = "#ccc";
                    actionBtn.style.boxShadow = "none";
                }
            })
            .catch((error) => {
                alert("A connection error occurred. Please try again.");
                if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
