<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        /* 🌍 全体を画面中央に配置 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: sans-serif;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📦 タイトルとお言葉コンテナをまとめる外枠 */
        #wrapper {
            max-width: 390px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px; /* 上下の箱のすき間 */
        }

        /* 🏷️ 新設：独立したタイトル専用コンテナ */
        #title-container {
            background: rgba(255, 255, 255, 0.5); /* 👈 透明度 0.5 */
            padding: 12px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #444;
        }

        /* 📜 メインコンテナ */
        #quote-container {
            background: rgba(255, 255, 255, 0.5); /* 👈 透明度 0.5 */
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            box-sizing: border-box;
            max-height: 75vh; /* タイトルの分、高さを少し調整 */
            overflow-y: auto;
        }

        .lang-block {
            margin-bottom: 0;
            line-height: 1.8;
        }

        .lang-english {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }

        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
         
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }
    </style>
</head>
<body>

    <!-- 📦 全体を綺麗に整列させるための外枠 -->
    <div id="wrapper">
        
        <!-- 🏷️ お言葉の箱の上に、独立した上品なタイトル箱を配置 -->
        <div id="title-container">Message from Her Holiness Shinnyo Keishu</div>

        <!-- 📜 メインのお言葉コンテナ -->
        <div id="quote-container">
            <div id="content-body">Loading...</div>
             
            <br>
            <button id="action-btn" onclick="toggleForm()">💌Send a Message of gratitude</button>
             
            <div id="message-form-container">
                <form id="thank-you-form" method="POST">
                    <input type="text" name="bukai" placeholder="Division (Optional)">
                    <input type="text" name="kei" placeholder="Lineage (Optional)">
                    <input type="text" name="name" placeholder="Name (Optional)">
                    <textarea name="message" rows="4" placeholder="Please enter your message..." required></textarea>
                    <br>
                    <button type="submit" id="submit-btn">Submit</button>
                </form>
            </div>
        </div>

    </div>
    
    <script>
        // 🌸 聖句データ（35〜40文字目安で美しく改行）
        const quotesData = [
            { en: "The buddhas are always with us, right by our side. Close your eyes and remember this whenever you are feeling low or facing difficulties in your life.", image: "bg1.jpg" },
            { en: "I come to understand the Buddha's heart through your warmth. Thank you.", image: "bg2.jpg" },
            { en: "Communication is very important. “Good morning.” “Hello!” Let’s begin with greetings.", image: "bg3.jpg" },
            { en: "Striving to do your best is a wonderful thing, but you may wear yourself out if you try too hard at the beginning. Set achievable goals and move forward little by little.", image: "bg4.jpg" },
            { en: "Buddha lies in everyone's heart. We all want to be kind, helpful, and truthful in some way. Whenever we feel like this, we discover a buddha in our own hearts.", image: "bg5.jpg" },
            { en: "Those who can reflect on themselves have pure hearts.", image: "bg6.jpg" },
            { en: "It's nice to look good, but that alone does not define beauty. With sincere words and conduct, anyone can be truly beautiful.", image: "bg7.jpg" },
            { en: "Cheerful, truthful, kind, warm — each of us has something special to offer.", image: "bg8.jpg" },
            { en: "Having the strength to try your best or the wish to do better in itself brings happiness.", image: "bg9.jpg" },
            { en: "Sometimes we all get tensed up. When I feel that way, I take a deep breath and then I'm ready to try my best again.", image: "bg10.jpg" },
            { en: "The buddhas guide you to encounter people at certain times and places for a reason.", image: "bg11.jpg" },
            { en: "Your heart shines each time you feel gratitude.", image: "bg12.jpg" },
            { en: "Never think, "I have nothing to offer!" The buddhas and many others count on you. Look forward and think positively. Just do your best, and you'll have no regrets.", image: "bg13.jpg" },
            { en: "Can we only sympathize with those whose experiences match our own? I think we can connect with others as long as we sincerely try to understand them and soothe their pain.", image: "bg14.jpg" },
            { en: "Being considerate means empathizing with others.", image: "bg15.jpg" },
            { en: "When something happens to bring me down, I tell myself to snap out of it, saying “There’s no use crying over spilled milk! I’ll be more careful and do better next time."", image: "bg16.jpg" },
            { en: "It’s important to consider your own needs, but more important to think of others. The buddhas will look after you when you try to be kind, warm, supportive, and devoted to others.", image: "bg17.jpg" },
            { en: "Never forget that many people have helped and loved you since the day you were born. Your life is important to your family, your friends, and me.", image: "bg18.jpg" },
            { en: "No one is perfect.", image: "bg19.jpg" },
            { en: "Treat all things as if they are alive and worthy of care. The more you cherish everything around you, the more blessed your life will be. Nature and the self, objects and people — all are one.<br>Nature and the self,<br> objects and people<br>— all are one.", image: "bg20.jpg" },
            { en: "We all find it difficult to communicate at times. Whenever this happens to you, listen carefully to the other person before giving your opinion. It will help to bring you closer together.", image: "bg21.jpg" },
            { en: "Everyone loves to be greeted with a smile. Giving someone a warm smile is also an important aspect of Buddhist training. It is a form of dana paramita.", image: "bg22.jpg" },
            { en: "When you try to do something good, you may need to make a conscious effort to follow through at first. Eventually, however, it will become a natural part of your behavior. Then you can discover the beautiful person within you.", image: "bg23.jpg" }
        ];

        // 🔗 GAS Web App URL
        const gasUrl = 'https://script.google.com/macros/s/AKfycbz27VJEIDm_tBf4iYYj5HYLsz7suTl1EXopg-vAhFeWoi1-aSanvAtIF3AZMTSmDv93/exec';

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        window.onload = function() {
            try {
                refreshQuote();
                sendAutoAccessLog(); // バックグラウンド自動アクセス送信
            } catch (error) {
                console.error("Initialization error:", error);
            }
        };

        function refreshQuote() {
            if (quotesData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            const selectedSet = quotesData[randomIndex];
            document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
            
            let htmlContent = "";
            if(selectedSet.en) htmlContent += `<div class="lang-block lang-english">${selectedSet.en}</div>`;
            document.getElementById("content-body").innerHTML = htmlContent;
        }

        // 📡 自動アクセスログ送信
        function sendAutoAccessLog() {
            const payload = { 
                type: "access", 
                lang: "en",       
                status: "Auto",   
                country: "Auto",  
                deviceId: getOrCreateDeviceId()
            };

            fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            })
            .catch((err) => { console.error("Auto log transmission failed:", err); });
        }

        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        // 📤 メッセージフォーム送信処理
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { 
                submitBtn.innerText = "Sending..."; 
                submitBtn.disabled = true; 
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData);
            
            payload.type = "message";
            payload.lang = "en"; 
            payload.status = "Auto";
            payload.country = "Auto";
            payload.deviceId = getOrCreateDeviceId();

            fetch(gasUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                alert("Your message has been sent.\nThank you.");
                form.reset();
                document.getElementById('message-form-container').style.display = 'none';
                const actionBtn = document.getElementById('action-btn');
                if (actionBtn) {
                    actionBtn.innerText = "💌 Sent";
                    actionBtn.style.display = 'inline-block';
                    actionBtn.disabled = true;
                    actionBtn.style.backgroundColor = "#ccc";
                    actionBtn.style.boxShadow = "none";
                }
            })
            .catch((error) => {
                alert("A connection error occurred. Please try again.");
                if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
