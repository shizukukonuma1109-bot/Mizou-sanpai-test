<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        /* 🌍 Centers the main box perfectly horizontally and vertically */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: 'Sarabun', sans-serif; /* Recommended for clean Thai reading */
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📜 Main container for the quotes */
        #quote-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 390px; 
            width: 100%;
            box-sizing: border-box;
            max-height: 85vh; 
            overflow-y: auto;
        }

        .lang-block {
            margin-bottom: 0;
        }

        /* 🇹🇭 Thai font spacing adjustment (important to prevent vowel clipping) */
        .lang-thai {
            font-size: 17px;
            font-weight: 500;
            color: #333;
            line-height: 1.8;
            word-break: break-word;
        }

        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }

        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
         
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="quote-container">
        <div id="content-body">Loading...</div>
         
        <br>
        <button id="action-btn" onclick="toggleForm()">💌 Message of Gratitude</button>
         
        <div id="message-form-container">
            <form id="thank-you-form" method="POST">
                <input type="text" name="bukai" placeholder="Division (Optional)">
                <input type="text" name="kei" placeholder="Lineage (Optional)">
                <input type="text" name="name" placeholder="Name (Optional)">
                <textarea name="message" rows="4" placeholder="Please enter your message..." required></textarea>
                <br>
                <button type="submit" id="submit-btn">Submit</button>
            </form>
        </div>
    </div>

    <script>
        // 🌸 New Sacred Quotes Data in Thai (23 Items Updated)
        const quotesData = [
            { th: "ปวงพระพุทธเจ้าสถิตอยู่เคียงข้างเราเสมอ  หลับตาและระลึกถึงสิ่งนี้ไว้ เมื่อใดก็ตามที่รู้สึกท้อแท้หรือกำลังเผชิญกับความยากลำบากในชีวิต", image: "bg1.jpg" },
            { th: "ฉันได้รับรู้ถึงจิตใจของพระพุทธองค์ ผ่านความอ่อนโยนและความเมตตาของคุณ ขอบคุณมาก", image: "bg2.jpg" },
            { th: "การสื่อสารเป็นสิ่งที่สำคัญมาก “อรุณสวัสดิ์” “สวัสดี” เรามาเริ่มต้นด้วยการกล่าวทักทายกันเถอะ", image: "bg3.jpg" },
            { th: "ความพยายามอย่างเต็มที่เป็นสิ่งวิเศษ แต่อาจจะเหนื่อยล้าหากเราพยายามอย่างหนักเกินไปตั้งแต่ต้น  ตั้งเป้าหมายที่ทำได้และก้าวไปข้างหน้าทีละน้อยจะดีกว่า", image: "bg4.jpg" },
            { th: "พระพุทธองค์สถิตอยู่ในใจของทุกคน  พวกเราทุกคนล้วนปรารถนาที่จะมีจิตใจดีงาม ช่วยเหลือผู้อื่น และมีความจริงใจ  เมื่อใดก็ตามที่เรามีความรู้สึกดี ๆ เช่นนี้ นั่นคือเราได้พบกับพุทธะที่อยู่ในใจของเรา", image: "bg5.jpg" },
            { th: "ผู้ที่สามารถสะท้อนมองตนเองได้นั้นเป็นผู้ที่มีจิตใจอันบริสุทธิ์", image: "bg6.jpg" },
            { th: "เราชอบที่จะมีรูปร่างหน้าตาดี แต่สิ่งนั้นเพียงอย่างเดียวไม่ใช่คำจำกัดความของคำว่าสวยงาม  ด้วยคำพูดและการกระทำที่จริงใจ ใคร ๆ ก็สามารถเป็นคนที่สวยงามอย่างแท้จริงได้", image: "bg7.jpg" },
            { th: "ความร่าเริง ความจริงใจ ความเมตตา ความอบอุ่น – พวกเราแต่ละคนมีบางสิ่งพิเศษที่สามารถมอบให้แก่ผู้อื่นได้", image: "bg8.jpg" },
            { th: "การมีพลังที่จะพยายามอย่างเต็มที่ หรือความปรารถนาที่จะทำให้ดียิ่งขึ้น นำความสุขมาให้", image: "bg9.jpg" },
            { th: "บางครั้งเรารู้สึกเครียด  เมื่อฉันรู้สึกเช่นนั้น ฉันจะหายใจเข้าลึก ๆ แล้วก็พร้อมที่จะพยายามอย่างเต็มที่อีกครั้ง", image: "bg10.jpg" },
            { th: "ปวงพระพุทธเจ้านำทางให้เราได้พบพานกับผู้คน ณ เวลาและสถานที่นั้น ๆ ด้วยเหตุผลอะไรบางอย่าง", image: "bg11.jpg" },
            { th: "จิตใจของเราเปล่งประกายทุกครั้งที่เรารู้สึกกตัญญูขอบคุณ", image: "bg12.jpg" },
            { th: "อย่าคิดว่า “ฉันไม่มีอะไรจะมอบให้!” ปวงพระพุทธเจ้าและผู้คนมากมายเชื่อมั่นในตัวคุณ  มองไปข้างหน้าและคิดในแง่บวก  เพียงแค่ทำอย่างเต็มที่ แล้วคุณจะไม่เสียใจภายหลัง", image: "bg13.jpg" },
            { th: "เราสามารถที่จะเห็นอกเห็นใจเฉพาะผู้ที่มีประสบการณ์ตรงกับเราเท่านั้นหรือ?  ฉันคิดว่าเราสามารถจะเชื่อมต่อกับผู้อื่นได้ ตราบเท่าที่เราเปิดใจพยายามทำความเข้าใจและช่วยบรรเทาความเจ็บปวดของพวกเขา", image: "bg14.jpg" },
            { th: "การคำนึงถึงผู้อื่นหมายถึงการเอาใจเขามาใส่ใจเราและเข้าอกเข้าใจผู้อื่น", image: "bg15.jpg" },
            { th: "เมื่อบางสิ่งเกิดขึ้นและทำให้ฉันรู้สึกแย่ ฉันจะบอกกับตัวเองให้หลุดออกจากความรู้สึกนั้น โดยกล่าวว่า “ไม่มีประโยชน์อะไรที่จะร้องไห้คร่ำครวญถึงน้ำนมที่หกไปแล้ว! คราวหน้าฉันจะระมัดระวังให้มากขึ้นและทำให้ดีขึ้นกว่านี้”", image: "bg16.jpg" },
            { th: "การพิจารณาความต้องการของตนเองเป็นสิ่งสำคัญ แต่การคิดถึงผู้อื่นมีความสำคัญยิ่งกว่า  ปวงพระพุทธเจ้าจะดูแลเราเมื่อเราพยายามเป็นคนที่ใจดี อบอุ่น ช่วยเหลือผู้อื่น และอุทิศตนเพื่อผู้อื่น", image: "bg17.jpg" },
            { th: "จงอย่าลืมว่ามีผู้คนมากมายที่ช่วยเรา และรักเราตั้งแต่วันที่เราเกิดมา ชีวิตของเรามีความสำคัญสำหรับครอบครัว เพื่อน และตัวฉัน", image: "bg18.jpg" },
            { th: "ไม่มีใครสมบูรณ์แบบ", image: "bg19.jpg" },
            { th: "ขอให้ปฏิบัติกับทุกสิ่งเหมือนกับว่าสิ่งนั้นมีชีวิตและมีค่าสำหรับการดูแล  ยิ่งเห็นคุณค่าของทุกสิ่งรอบ ๆ ตัวเท่าใด ชีวิตของเราก็จะได้รับพระพรมากขึ้นเท่านั้น  ธรรมชาติและตัวเรา สิ่งของและผู้คน – ล้วนเป็นหนึ่งเดียวกัน", image: "bg20.jpg" },
            { th: "บ่อยครั้งเราพบกับปัญหาทางด้านการสื่อสาร  เมื่อใดก็ตามที่สิ่งนี้เกิดขึ้น ให้ฟังความคิดเห็นของคนอื่นก่อนที่จะออกความคิดเห็นของตัวเอง  นั่นจะทำให้ทั้งสองคนใกล้ชิดกันมากขึ้น", image: "bg21.jpg" },
            { th: "ทุกคนชอบการต้อนรับด้วยรอยยิ้ม  การมอบรอยยิ้มอันอบอุ่นเป็นส่วนสำคัญในการฝึกปฏิบัติทางพุทธศาสนาด้วยเช่นกัน  เป็นรูปแบบหนึ่งของ “ทานบารมี”", image: "bg22.jpg" },
            { th: "เมื่อเราพยายามทำสิ่งที่ดี เราอาจต้องพยายามอย่างมีสติเพื่อที่จะทำตามให้สำเร็จก่อน ในที่สุด  มันก็จะกลายเป็นนิสัยของเราโดยธรรมชาติ  แล้วเราจะพบความงดงามอยู่ในตัว", image: "bg23.jpg" }
        ];

        // 🔗 GAS Web App URL (★ Please replace with your own URL ★)
        const gasUrl = 'https://script.google.com/macros/s/AKfycbyTxTrGnY9d-kEnDbEEwWRx12ErWl3xekOkZzaEhIid9bMT5MHE53qkuJEKeiWvpU6m/exec';

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        // 🎬 Executed automatically on page load
        window.onload = function() {
            try {
                // 1. Display a random quote
                refreshQuote();
                
                // 2. Automatically send an access log in the background
                sendAutoAccessLog();
            } catch (error) {
                console.error("Initialization error:", error);
            }
        };

        // 🎲 Randomly selects and shows a quote
        function refreshQuote() {
            if (quotesData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            const selectedSet = quotesData[randomIndex];
            
            // Update background image
            document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
            
            // Update quote text (Thai styling applied)
            let htmlContent = "";
            if(selectedSet.th) htmlContent += `<div class="lang-block lang-thai">${selectedSet.th}</div>`;
            document.getElementById("content-body").innerHTML = htmlContent;
        }

        // 📡 Automatically sends data to GAS on load
        function sendAutoAccessLog() {
            fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    type: "access", 
                    lang: "th",       // ✨ GAS側にタイ語QRからのアクセスだと伝える
                    status: "Auto",   
                    country: "Auto",  
                    deviceId: getOrCreateDeviceId()
                })
            })
            .catch((err) => { console.error("Auto log transmission failed:", err); });
        }

        // 💌 Toggle the visibility of the message form
        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        // 📤 Form submission process
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { submitBtn.innerText = "Sending..."; submitBtn.disabled = true; }

            const formData = new FormData(form);
            formData.append("type", "message"); 
            formData.append("lang", "th");      // ✨ メッセージ送信時もタイ語コードを付与
            formData.append("status", "Auto"); 
            formData.append("country", "Auto");
            formData.append("deviceId", getOrCreateDeviceId());

            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch(gasUrl, { 
                method: 'POST', 
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: json 
            })
            .then(() => {
                alert("Your message of gratitude has been sent to the secretariat. Thank you very much.");
                form.reset();
                document.getElementById('message-form-container').style.display = 'none';
                const actionBtn = document.getElementById('action-btn');
                if (actionBtn) {
                    actionBtn.innerText = "💌 Sent";
                    actionBtn.style.display = 'inline-block';
                    actionBtn.disabled = true;
                    actionBtn.style.backgroundColor = "#ccc";
                    actionBtn.style.boxShadow = "none";
                }
            })
            .catch((error) => {
                alert("A connection error occurred. Please try again.");
                if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
