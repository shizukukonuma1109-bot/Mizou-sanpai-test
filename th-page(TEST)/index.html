<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        /* 🌍 จัดให้อยู่กึ่งกลางหน้าจออย่างสมบูรณ์ */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: sans-serif;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📜 กล่องข้อความหลัก */
        #quote-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 390px; 
            width: 100%;
            box-sizing: border-box;
            max-height: 85vh; 
            overflow-y: auto;
        }

        .lang-block {
            margin-bottom: 0;
            line-height: 1.8;
        }

        .lang-thai {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }

        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
        
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }
    </style>
</head>
<body>

    <div id="quote-container">
        <div id="content-body">กำลังโหลด...</div>
        
        <br>
        <button id="action-btn" onclick="toggleForm()">💌 ข้อความแสดงความขอบคุณ</button>
        
        <div id="message-form-container">
            <form id="thank-you-form" method="POST">
                <input type="text" name="bukai" placeholder="ฝ่าย / แผนก (ไม่บังคับ)">
                <input type="text" name="kei" placeholder="สาย(ไม่บังคับ)">
                <input type="text" name="name" placeholder="ชื่อ (ไม่บังคับ)">
                <textarea name="message" rows="4" placeholder="กรุณากรอกข้อความแสดงความขอบคุณของคุณ..." required></textarea>
                <br>
                <button type="submit" id="submit-btn">ส่งข้อความ</button>
            </form>
        </div>
    </div>

    <script>
        // 🌸 ข้อมูลคำสอนอันศักดิ์สิทธิ์ (23 ข้อความ)
        const quotesData = [
            { th: "อยู่ด้วยกันเสมอ อยู่เคียงข้างเธอเสมอ<br>นั่นคือพระพุทธองค์ เมื่อใดที่รู้สึกท้อแท้ เศร้าใจ<br>หรือสูญเสียความมั่นใจ<br>จงหลับตาลงและระลึกไว้ว่า<br>เธอนั้นอยู่ร่วมกับพระพุทธองค์เสมอ", image: "bg1.jpg" },
            { th: "ฉันได้เรียนรู้ถึง \"พระทัย\" ของพระพุทธองค์ผ่านความเมตตาของคุณ ขอบคุณนะ", image: "bg2.jpg" },
            { th: "การสื่อสารเป็นสิ่งสำคัญมาก ไม่ว่าจะผ่านคำพูดหรือท่าทาง<br>\"อรุณสวัสดิ์\" \"สวัสดี\"<br><br>มาเริ่มกันด้วยการทักทายกันเถอะ", image: "bg3.jpg" },
            { th: "เป็นสิ่งวิเศษมากที่คุณรู้สึกมีแรงผลักดันที่จะทำสิ่งต่างๆ ให้ดีที่สุด<br>อย่างไรก็ตาม หากหักโหมมากเกินไปในทันที<br>คุณอาจจะรู้สึกเหนื่อยล้าได้<br>อย่าฝืนตนเอง ค่อยเป็นค่อยไปทีละก้าว<br>ลองเริ่มจากสิ่งที่คุณสามารถทำได้ก่อนดีไหม", image: "bg4.jpg" },
            { th: "พระพุทธองค์สถิตอยู่ภายในใจ<br>ของทุกคน<br>ความปรารถนาที่จะใจดี ที่จะช่วยเหลือ ที่จะซื่อสัตย์—<br>คุณเองก็มีจิตใจเช่นนั้นอยู่บ้างใช่ไหม?<br>\"สิ่งเล็กๆ\" นั้นแหละ คือพระพุทธองค์องค์น้อยในตัวคุณ", image: "bg5.jpg" },
            { th: "ผู้ที่รู้จักทบทวนและสะท้อนดูตนเอง<br>คือผู้ที่มีจิตใจที่งดงาม", image: "bg6.jpg" },
            { th: "การดูแลรูปลักษณ์ภายนอกให้เรียบร้อยและงดงามนั้น<br>เป็นสิ่งที่ดีมาก และยิ่งหากเพิ่มคำพูด<br>และทัศนคติที่มาจากใจเข้าไปด้วย<br>คุณก็จะยิ่งงดงามมากยิ่งขึ้นไปอีก", image: "bg7.jpg" },
            { th: "ร่าเริง แจ่มใส ซื่อตรง มีเมตตา อบอุ่น— \"คนๆ นั้นช่างดีเหลือเกิน\"<br>อาจมีใครบางคนกล่าวเช่นนั้น<br>คุณเองก็มีสิ่งดีๆ เช่นนั้นอยู่ภายในตัวอย่างแน่นอน<br>พวกเราทุกคนต่างมีสิ่งพิเศษที่จะมอบให้แก่กัน", image: "bg8.jpg" },
            { th: "การมีความปรารถนาที่จะพยายามและพัฒนาตนเองให้ดีขึ้น—<br>สิ่งนั้นเองคือ \"ความสุข\"", image: "bg9.jpg" },
            { th: "บางครั้งคุณก็แค่อยากถอนหายใจลึกๆ แล้วพูดว่า<br>\"เฮ้อ\" ใช่ไหมล่ะ?<br>ฉันเองก็เป็นเหมือนกัน ในเวลาเช่นนั้น<br>ลองสูดหายใจเข้าลึกๆ ให้ร่างกายเต็มไปด้วยออกซิเจน...<br><br>\"เอาล่ะ มาพยายามกันใหม่อีกครั้งนะ\"", image: "bg10.jpg" },
            { th: "บุคคลที่คุณได้ใช้เวลาร่วมด้วย ณ เวลาและสถานที่หนึ่งๆ<br>อาจเป็นบุคคลสำคัญที่พระพุทธองค์ทรงนำพาเข้ามาในชีวิตของคุณก็เป็นได้", image: "bg11.jpg" },
            { th: "ทุกครั้งที่คุณรู้สึกซาบซึ้งและขอบคุณ<br>หัวใจของคุณจะเปล่งประกายงดงามยิ่งขึ้น", image: "bg12.jpg" },
            { th: "อย่าก้าวถอยหลังเพียงเพราะคิดว่า<br>\"ฉันมันไม่เอาไหน...\"<br>พระพุทธองค์ทรงคาดหวังในตัวคุณอย่างมากในแบบที่คุณเป็น มีใครบางคนที่ต้องการคุณ<br>ในแบบที่คุณเป็นเช่นกัน<br>จงมองไปข้างหน้าและคิดในแง่บวก<br><br>หากคุณทำดีที่สุดแล้ว ก็ไม่มีสิ่งใดต้องเสียใจ", image: "bg13.jpg" },
            { th: "เราจำเป็นต้องผ่านประสบการณ์แบบเดียวกัน<br>เพื่อที่จะเข้าใจความรู้สึกของผู้อื่นจริงหรือ?<br>ฉันไม่คิดเช่นนั้น<br>ตราบใดที่มีความจริงใจที่จะช่วยบรรเทาความทุกข์หรือความเศร้า<br>และพร้อมที่จะแบ่งเบามันแม้เพียงเล็กน้อย พวกเราก็สามารถเชื่อมถึงกันได้", image: "bg14.jpg" },
            { th: "ความเห็นอกเห็นใจ หมายถึง<br>การนำตัวเราเข้าไปนั่งอยู่ในหัวใจของผู้อื่น", image: "bg15.jpg" },
            { th: "ฉันเองก็มีช่วงเวลาที่หดหู่เช่นกัน<br>แต่ในเวลาแบบนั้น ฉันจะบอกตัวเอง<br>ให้เปลี่ยนมุมมองความคิดใหม่:<br>\"มันช่วยไม่ได้ สิ่งนั้นมันผ่านไปแล้ว<br>คราวหน้าต้องระวังให้มากกว่านี้นะ!\"", image: "bg16.jpg" },
            { th: "การคิดถึงเรื่องของตนเองนั้นเป็นสิ่งสำคัญ<br>แต่การคิดถึงเรื่องของผู้อื่นเสมือนเป็นเรื่องของตนเอง<br>นั้นเป็นสิ่งสำคัญยิ่งกว่า<br>บุคคลที่ใจดี อบอุ่น คอยเกื้อหนุน<br>และอุทิศตนเพื่อผู้อื่น จะเป็นผู้ที่พระพุทธองค์ทรงรักและทะนุถนอม", image: "bg17.jpg" },
            { th: "จงจดจำว่ามีผู้คนมากมายเพียงใดที่คอยช่วยเหลือและมอบความรักให้แก่คุณ<br>ตั้งแต่คุณเกิดมาจนถึงตอนนี้ ชีวิตของทุกคนล้วนมีค่า<br>ต่อครอบครัว ต่อเพื่อนพ้อง และต่อตัวฉันเอง", image: "bg18.jpg" },
            { th: "ไม่มีใครในโลกนี้ที่สมบูรณ์แบบ", image: "bg19.jpg" },
            { th: "จงเห็นคุณค่าของสิ่งของ ทุกสรรพสิ่งล้วนมีชีวิต<br>หากคุณดูแลรักษาพวกมันอย่างดี คุณก็จะได้รับการปกป้องจากสิ่งเหล่านั้น<br>ธรรมชาติกับตัวเรา เครื่องมือเครื่องใช้กับผู้คน—<br>ทั้งหมดล้วนหลอมรวมเป็นหนึ่งเดียวกัน", image: "bg20.jpg" },
            { th: "เราจำเป็นต้องผ่านประสบการณ์แบบเดียวกัน<br>เพื่อที่จะเข้าใจความรู้สึกของผู้อื่นจริงหรือ?<br>ฉันไม่คิดเช่นนั้น<br>ตราบใดที่มีความจริงใจที่จะช่วยบรรเทาความทุกข์หรือความเศร้า<br>และพร้อมที่จะแบ่งเบามันแม้เพียงเล็กน้อย พวกเราก็สามารถเชื่อมถึงกันได้", image: "bg21.jpg" },
            { th: "การต้อนรับผู้อื่นด้วยรอยยิ้มที่อ่อนโยนและอบอุ่น เรียกว่า<br>\"วากันเซะ\" (การทานด้วยใบหน้าที่ยิ้มแย้ม)<br>คุณเองก็คงมีความสุขใช่ไหมหากได้รับการต้อนรับด้วยรอยยิ้ม?<br>สิ่งนี้คือหนึ่งในหลักปฏิบัติที่สำคัญยิ่งในทางพระพุทธศาสนา", image: "bg22.jpg" },
            { th: "การทำความดีอาจต้องใช้ความตั้งใจและพยายามในช่วงแรก<br>เพื่อให้ทำได้อย่างต่อเนื่อง เมื่อคุณคอยบอกตัวเองซ้ำแล้วซ้ำเล่า<br>การทำความดีนั้นจะกลายเป็น \"นิสัย\" ไปเองโดยธรรมชาติ<br>และในวินาทีนั้น คุณจะได้พบกับตัวคุณเองในเวอร์ชันที่งดงามที่สุด", image: "bg23.jpg" }
        ];

        // 🔗 GAS Web App URL (★สร้างเวอร์ชันใหม่ใน GAS แล้วนำ URL มาแปะที่นี่★)
        const gasUrl = 'https://script.google.com/macros/s/AKfycbwm_OZNzB6InOe13226T9oX1yNpQampRa2cZ45_CwVCFkm1Dp_s7bLktWAVzniNV5pL/exec';

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        window.onload = function() {
            try {
                refreshQuote();
                sendAutoAccessLog(); // บันทึกสถิติการเข้าชมอัตโนมัติ
            } catch (error) {
                console.error("Initialization error:", error);
            }
        };

        function refreshQuote() {
            if (quotesData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            const selectedSet = quotesData[randomIndex];
            document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
            
            let htmlContent = "";
            if(selectedSet.th) htmlContent += `<div class="lang-block lang-thai">${selectedSet.th}</div>`;
            document.getElementById("content-body").innerHTML = htmlContent;
        }

        // 📡 ส่งบันทึกการเข้าชมไปยัง GAS (ลบ no-cors ออก ส่งเป็น text/plain เพื่อป้องกันการเบิ้ล)
        function sendAutoAccessLog() {
            const payload = { 
                type: "access", 
                lang: "thai",     // 👈 ระบุเพื่อให้ GAS บวกแต้มที่ช่องภาษาไทย (คอลัมน์ B)
                status: "Auto",   
                country: "Auto",  
                deviceId: getOrCreateDeviceId()
            };

            fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            })
            .catch((err) => { console.error("Auto log transmission failed:", err); });
        }

        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        // 📤 ส่งแบบฟอร์มข้อความขอบคุณ
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { 
                submitBtn.innerText = "กำลังส่ง..."; 
                submitBtn.disabled = true; // ล็อกปุ่มทันทีเพื่อป้องกันการกดเบิ้ล
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData);
            
            payload.type = "message";
            payload.lang = "thai"; // 👈 ระบุภาษาไทยสำหรับข้อความขอบคุณ
            payload.status = "Auto";
            payload.country = "Auto";
            payload.deviceId = getOrCreateDeviceId();

            fetch(gasUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                alert("ส่งข้อความแสดงความขอบคุณของคุณเรียบร้อยแล้ว ขอบคุณมากค่ะ");
                form.reset();
                document.getElementById('message-form-container').style.display = 'none';
                const actionBtn = document.getElementById('action-btn');
                if (actionBtn) {
                    actionBtn.innerText = "💌 ส่งแล้ว";
                    actionBtn.style.display = 'inline-block';
                    actionBtn.disabled = true;
                    actionBtn.style.backgroundColor = "#ccc";
                    actionBtn.style.boxShadow = "none";
                }
            })
            .catch((error) => {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง");
                if (submitBtn) { submitBtn.innerText = "ส่งข้อความ"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
