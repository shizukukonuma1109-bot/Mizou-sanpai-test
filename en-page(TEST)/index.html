<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
        }
        #quote-container {
            background: rgba(255, 255, 255, 0.75);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            /* Fixed width for consistent line breaks across devices */
            max-width: 390px; 
            width: 100%;
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .lang-block {
            margin-bottom: 0;
            line-height: 1.6;
        }

        .lang-english {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        /* Action Button Styles */
        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active {
            transform: scale(0.95);
        }

        /* Form Styles */
        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input & Textarea Styles */
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            margin-bottom: 15px;
        }

        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active {
            transform: scale(0.95);
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div id="quote-container">
        <div id="content-body">Loading...</div>
        
        <button id="action-btn" onclick="toggleForm()">💌 Message of Gratitude</button>

        <div id="message-form-container">
            <form id="thank-you-form" method="POST">
                <input type="text" name="bukai" placeholder="Department (Optional)">
                <input type="text" name="kei" placeholder="Section (Optional)">
                <input type="text" name="name" placeholder="Name (Optional)">
                
                <textarea name="message" rows="4" placeholder="Enter your message here..." required></textarea>
                <br>
                <button type="submit" id="submit-btn">Submit</button>
            </form>
        </div>
    </div>

    <script>
        const quotesData = [
            { en: "The buddhas are always with us,<br>right by our side.<br>Close your eyes and remember this whenever you are feeling low or facing difficulties in your life.", image: "bg1.jpg" },
            { en: "I come to understand the Buddha's heart through your warmth. Thank you.", image: "bg2.jpg" },
            { en: "Communication is very important.<br>“Good morning.” “Hello!”<br>Let’s begin with greetings.", image: "bg3.jpg" },
            { en: "Striving to do your best is a wonderful thing, but you may wear yourself out if you try too hard at the beginning.<br>Set achievable goals and move forward little by little.", image: "bg4.jpg" },
            { en: "Buddha lies in everyone's heart.<br>We all want to be kind, helpful, and truthful in some way. Whenever we feel like this, we discover a buddha in our own hearts.", image: "bg5.jpg" },
            { en: "Those who can reflect on themselves have pure hearts.", image: "bg6.jpg" },
            { en: "It's nice to look good,<br>but that alone does not define beauty.<br>With sincere words and conduct,<br>anyone can be truly beautiful.", image: "bg7.jpg" },
            { en: "Cheerful, truthful, kind, warm —<br>each of us has<br>something special to offer.", image: "bg8.jpg" },
            { en: "Having the strength to try your best or the wish to do better in itself brings happiness.", image: "bg9.jpg" },
            { en: "Sometimes we all get tensed up.<br>When I feel that way, I take a deep breath and then I'm ready to try my best again.", image: "bg10.jpg" },
            { en: "The buddhas guide you to encounter people at certain times and<br>places for a reason.", image: "bg11.jpg" },
            { en: "Your heart shines each time you feel gratitude.", image: "bg12.jpg" },
            { en: "Never think, \"I have nothing to offer!\"<br>The buddhas and many others count on you.<br>Look forward and think positively. Just do your best, and you'll have no regrets.", image: "bg13.jpg" },
            { en: "Can we only sympathize with those whose experiences match our own?<br>I think we can connect with others as long as we sincerely try to understand them and soothe their pain.", image: "bg14.jpg" },
            { en: "Being considerate means empathizing with others.", image: "bg15.jpg" },
            { en: "When something happens to bring me down, I tell myself to snap out of it, saying “There’s no use crying over spilled milk! I’ll be more careful and<br>do better next time.”", image: "bg16.jpg" },
            { en: "It’s important to consider your own needs, but more important to think of others.<br>The buddhas will look after you when you try to be kind, warm, supportive, and devoted to others.", image: "bg17.jpg" },
            { en: "Never forget that many people have helped and loved you since the day you were born.<br>Your life is important to your family, your friends, and me.", image: "bg18.jpg" },
            { en: "No one is perfect.", image: "bg19.jpg" },
            { en: "Treat all things as if they are alive and worthy of care. The more you cherish everything around you,<br>the more blessed your life will be.<br>Nature and the self, objects and people<br> — all are one.", image: "bg20.jpg" },
            { en: "We all find it difficult to communicate at times. Whenever this happens to you, listen carefully to the other person before giving your opinion.<br>It will help to bring you closer together.", image: "bg21.jpg" },
            { en: "Everyone loves to be greeted with a smile.<br>Giving someone a warm smile is also an important aspect of Buddhist training. It is a form of dana paramita.", image: "bg22.jpg" },
            { en: "When you try to do something good,<br>you may need to make a conscious effort<br>to follow through at first.<br> Eventually,it will become a natural<br>partof your behavior.<br>Then you can discover<br>the beautiful person within you.", image: "bg23.jpg" }
        ];
        window.onload = function() {
            try {
                const randomIndex = Math.floor(Math.random() * quotesData.length);
                const selectedSet = quotesData[randomIndex];
                
                document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
                
                let htmlContent = "";
                if(selectedSet.en) htmlContent += `<div class="lang-block lang-english">${selectedSet.en}</div>`;
                
                document.getElementById("content-body").innerHTML = htmlContent;
            } catch (error) {
                alert("Loading Error");
                console.error("Error details:", error);
            }
        };

        function toggleForm() {
            const formContainer = document.getElementById('message-form-container');
            const actionBtn = document.getElementById('action-btn');
            formContainer.style.display = 'block';
            actionBtn.style.display = 'none';
        }

        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) {
                submitBtn.innerText = "Sending...";
                submitBtn.disabled = true;
            }

            const formData = new FormData(form);
            formData.append("lang", "EN");

            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            // Paste your Google Apps Script URL below
            const gasUrl = 'https://script.google.com/macros/s/AKfycbyG_zASneceAHfO8n3en4w5-JH94hHJfx8mQAZzdxXqRjYZAaVtfvkdz11kbK0MYP9y/exec';

            fetch(gasUrl, {
                method: 'POST',
                body: json
            })
            .then(async (response) => {
                let res = await response.json();
                if (res.status === "success") {
                    alert("Your message of gratitude has been sent successfully.");
                    form.reset();
                    
                    const formContainer = document.getElementById('message-form-container');
                    if (formContainer) formContainer.style.display = 'none';
                    
                    const actionBtn = document.getElementById('action-btn');
                    if (actionBtn) {
                        actionBtn.innerText = "💌 Sent";
                        actionBtn.style.display = 'inline-block';
                        actionBtn.disabled = true;
                        actionBtn.style.backgroundColor = "#ccc";
                        actionBtn.style.boxShadow = "none";
                    }
                } else {
                    alert("Submission failed: " + (res.message || "Unknown error"));
                    if (submitBtn) {
                        submitBtn.innerText = "Submit";
                        submitBtn.disabled = false;
                    }
                }
            })
            .catch((error) => {
                alert("Submission failed. Please try again later.");
                console.error(error);
                if (submitBtn) {
                    submitBtn.innerText = "Submit";
                    submitBtn.disabled = false;
                }
            });
        });
    </script>

</body>
</html>
