<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
        }
        #quote-container {
            background: rgba(255, 255, 255, 0.75);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            /* 💡最大幅を600pxから390pxに絞りました。これで大画面スマホでも折り返しが固定されます */
            max-width: 390px; 
            width: 100%;
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .lang-block {
            margin-bottom: 0;
            line-height: 1.7;
        }

        .lang-japanese {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        /* Action Button Styles */
        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active {
            transform: scale(0.95);
        }

        /* Form Styles */
        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input & Textarea Styles */
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            margin-bottom: 15px;
        }

        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active {
            transform: scale(0.95);
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div id="quote-container">
        <div id="content-body">Loading...</div>
        
        <button id="action-btn" onclick="toggleForm()">💌 感謝のメッセージを送る</button>

        <div id="message-form-container">
            <form id="thank-you-form" method="POST">
                <input type="text" name="bukai" placeholder="部会（任意）">
                <input type="text" name="kei" placeholder="経（任意）">
                <input type="text" name="name" placeholder="お名前（任意）">
                
                <textarea name="message" rows="4" placeholder="メッセージを入力してください..." required></textarea>
                <br>
                <button type="submit" id="submit-btn">送信</button>
            </form>
        </div>
    </div>

    <script>
        // 23個の日本語メッセージと背景画像の組み合わせ
        const quotesData = [
            { jp: "いつも一緒。いつもそばにいてくださる。<br>それが、みほとけ。つらく、せつなく、<br>自信をなくしかけたとき、<br>眼を閉じて思い出してみてください。<br> 自分は、みほとけとともにある――と。", image: "bg1.jpg" },
            { jp: "あなたのやさしさにみほとけの“こころ”を知りました。ありがとう。", image: "bg2.jpg" },
            { jp: "言葉でも身ぶりでも会話はとても大切です。<br>「おはようございます」「こんにちは」<br><br>まずは、あいさつから。", image: "bg3.jpg" },
            { jp: "「がんばろう」と思えたこと、<br>すばらしいですね。<br>けれども急にしたら<br>疲れてしまうかもしれません。<br>無理せず、少しずつ。<br>できることから始めてみませんか。", image: "bg4.jpg" },
            { jp: "みほとけは みなさんの心の中に<br>おわします。<br>やさしくしたい たすけたい　正直でいたい<br>そういう心、ちょっとはありますよね。<br>その“ちょっと”が、小さなみほとけです。", image: "bg1.jpg" },
            { jp: "反省できるひとは、<br>きれいな心の持ち主です。", image: "bg2.jpg" },
            { jp: "姿やカタチをきれいにするのは<br>とてもよいこと。それに心のこもった<br>言葉や態度が加われば<br>もっと美しくなれるのです。", image: "bg3.jpg" },
            { jp: "楽しそう、素直そう、親切でやさしそう――「あのひとって、よいひとね」<br>と言われるような、<br>よいところ、 あなたにも、必ずあるはず。", image: "bg4.jpg" },
            { jp: "努力しよう、よくしたいと思えること。<br>それも“しあわせ”。", image: "bg1.jpg" },
            { jp: "ときには「はーっ」と<br>息をつきたくなること、ありますよね。<br>私もあります。そんなときは、<br>深呼吸して 酸素をいっぱい<br>体の中に入れて…。 <br><br>「さあ、またがんばりましょう」", image: "bg2.jpg" },
            { jp: "ある時、ある場所で、一緒にすごすひとは<br>みほとけがめぐりあわせてくれた<br>大事なひとかもしれません。", image: "bg3.jpg" },
            { jp: "「ありがたいな」と思うたび、<br>心はかがやいていきます。", image: "bg4.jpg" },
            { jp: "「こんな自分はだめだ…」と<br>ひっこまないで。<br>こんな自分を、みほとけは期待しています。こんな自分を、必要としている<br>ひとがいるのです。<br>前向きに、プラス思考で。<br><br> 力をだせたら、後悔はいりません。", image: "bg1.jpg" },
            { jp: "おなじ経験をしなければ<br>ひとの気持ちにはなれないのでしょうか。<br>私は、そうは思いません。<br>苦しみや悲しみをいやしたい<br>少しでもわかちあいたい<br>その誠意があればつながります。", image: "bg2.jpg" },
            { jp: "思いやりとは、<br>そのひとの心になっていくこと。", image: "bg3.jpg" },
            { jp: "私も、おちこむことがあります。<br>けれども、そんなときは自分に<br>こう言いきかせてきりかえるのです。<br>「しかたがない、終わったこと。<br> 次は気をつけよう！」", image: "bg4.jpg" },
            { jp: "自分のことをよく考えるのは大事。<br>ひとのことを自分ごととして<br>考えるのはもっと大事。<br>やさしく、あたたかく、ささえ、<br>つくしていくひとは<br>みほとけから大事にされます。", image: "bg1.jpg" },
            { jp: "生まれてから今まで、どれだけ多くのひとが<br>あなたを助け愛情をかけてくれたか、<br>忘れないで。 みんな、家族にとって、<br>仲間にとって、私にとって、大切な命です。", image: "bg2.jpg" },
            { jp: "ひとは誰も、完ぺきではありません。", image: "bg3.jpg" },
            { jp: "ものを大切にしていくこと。<br>すべてに命があります。<br>大切にすれば、大切にしたものに守られます。<br>自然と自分、道具とひと、<br>みな一体です。", image: "bg4.jpg" },
            { jp: "ひととのコミュニケーションで悩むこと、<br>ありませんか。そんなときは相手の<br>言うことに耳をかたむけてみましょう。<br>自分の考えを述べるのはそのあとで。<br>そうすれば距離を縮めることができます。", image: "bg1.jpg" },
            { jp: "なごやかな、あたたかいほほえみで接する。<br>これを、和顔施（わがんせ）といいます。<br>みなさんも、笑顔で迎えられたら、<br>うれしいでしょう？<br>仏教の重要な修行のひとつです。", image: "bg2.jpg" },
            { jp: "よいことをするにもはじめは“意識”して<br>おこなわないと続かないかもしれません。<br>何度も自分に言いきかせていくうちに<br>自然とよいことが“習慣”になります。<br>そのとき、ステキな自分が見つかりますよ。", image: "bg3.jpg" }
        ];

        window.onload = function() {
            try {
                const randomIndex = Math.floor(Math.random() * quotesData.length);
                const selectedSet = quotesData[randomIndex];
                
                // 背景画像を設定
                document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
                
                let htmlContent = "";
                if(selectedSet.jp) htmlContent += `<div class="lang-block lang-japanese">${selectedSet.jp}</div>`;
                
                document.getElementById("content-body").innerHTML = htmlContent;
            } catch (error) {
                alert("Loading Error");
                console.error("Error details:", error);
            }
        };

        function toggleForm() {
            const formContainer = document.getElementById('message-form-container');
            const actionBtn = document.getElementById('action-btn');
            formContainer.style.display = 'block';
            actionBtn.style.display = 'none';
        }

        // 送信処理（JSON形式 ＋ 言語スタンプ自動追加）
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) {
                submitBtn.innerText = "Sending...";
                submitBtn.disabled = true;
            }

            const formData = new FormData(form);
            formData.append("lang", "JP");

            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            // ★【重要】ここにいつものGASのURLを貼り付けてください！
            const gasUrl = 'https://script.google.com/macros/s/AKfycbyG_zASneceAHfO8n3en4w5-JH94hHJfx8mQAZzdxXqRjYZAaVtfvkdz11kbK0MYP9y/exec';

            fetch(gasUrl, {
                method: 'POST',
                body: json
            })
            .then(async (response) => {
                let res = await response.json();
                if (res.status === "success") {
                    alert("Thank you! Your message has been sent successfully.");
                    form.reset();
                    
                    const formContainer = document.getElementById('message-form-container');
                    if (formContainer) formContainer.style.display = 'none';
                    
                    const actionBtn = document.getElementById('action-btn');
                    if (actionBtn) {
                        actionBtn.innerText = "💌 Message Sent";
                        actionBtn.style.display = 'inline-block';
                        actionBtn.disabled = true;
                        actionBtn.style.backgroundColor = "#ccc";
                        actionBtn.style.boxShadow = "none";
                    }
                } else {
                    alert("Transmission failed: " + (res.message || "Unknown error"));
                    if (submitBtn) {
                        submitBtn.innerText = "送信";
                        submitBtn.disabled = false;
                    }
                }
            })
            .catch((error) => {
                alert("Transmission failed. Please try again later.");
                console.error(error);
                if (submitBtn) {
                    submitBtn.innerText = "送信";
                    submitBtn.disabled = false;
                }
            });
        });
    </script>

</body>
</html>
