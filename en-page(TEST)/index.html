<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        /* 🌍 全体を画面中央に配置 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: sans-serif;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📜 メインコンテナ */
        #quote-container {
            background: rgba(255, 255, 255, 0.5);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 390px; 
            width: 100%;
            box-sizing: border-box;
            max-height: 85vh; 
            overflow-y: auto;
        }

        .lang-block {
            margin-bottom: 0;
            line-height: 1.8;
        }

        .lang-english {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }

        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
         
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }
    </style>
</head>
<body>

    <div id="quote-container">
        <div id="content-body">Loading...</div>
         
        <br>
        <button id="action-btn" onclick="toggleForm()">💌 Message of Gratitude</button>
         
        <div id="message-form-container">
            <form id="thank-you-form" method="POST">
                <input type="text" name="bukai" placeholder="Division (Optional)">
                <input type="text" name="kei" placeholder="Lineage (Optional)">
                <input type="text" name="name" placeholder="Name (Optional)">
                <textarea name="message" rows="4" placeholder="Please enter your message..." required></textarea>
                <br>
                <button type="submit" id="submit-btn">Submit</button>
            </form>
        </div>
    </div>

    <script>
        // 🌸 聖句データ（35〜40文字目安で美しく改行）
        const quotesData = [
            { en: "The buddhas are always with us,<br>right by our side.<br>Close your eyes and remember this<br>whenever you are feeling low<br>or facing difficulties in your life.", image: "bg1.jpg" },
            { en: "I come to understand<br>the Buddha's heart<br>through your warmth.<br>Thank you.", image: "bg2.jpg" },
            { en: "Communication is very important.<br>“Good morning.” “Hello!”<br>Let’s begin with greetings.", image: "bg3.jpg" },
            { en: "Striving to do your best<br>is a wonderful thing,<br>but you may wear yourself out<br>if you try too hard at the beginning.<br>Set achievable goals<br>and move forward little by little.", image: "bg4.jpg" },
            { en: "Buddha lies in everyone's heart.<br>We all want to be kind,<br>helpful, and truthful in some way.<br>Whenever we feel like this,<br>we discover a buddha<br>in our own hearts.", image: "bg5.jpg" },
            { en: "Those who can reflect<br>on themselves<br>have pure hearts.", image: "bg6.jpg" },
            { en: "It's nice to look good,<br>but that alone does not define beauty.<br>With sincere words and conduct,<br>anyone can be truly beautiful.", image: "bg7.jpg" },
            { en: "Cheerful, truthful, kind, warm —<br>each of us has something<br>special to offer.", image: "bg8.jpg" },
            { en: "Having the strength to try your best<br>or the wish to do better<br>in itself brings happiness.", image: "bg9.jpg" },
            { en: "Sometimes we all get tensed up.<br>When I feel that way,<br>I take a deep breath and then<br>I'm ready to try my best again.", image: "bg10.jpg" },
            { en: "The buddhas guide you to encounter<br>people at certain times and places<br>for a reason.", image: "bg11.jpg" },
            { en: "Your heart shines each time<br>you feel gratitude.", image: "bg12.jpg" },
            { en: "Never think, \"I have nothing to offer!\"<br>The buddhas and many others<br>count on you.<br>Look forward and think positively.<br>Just do your best,<br>and you'll have no regrets.", image: "bg13.jpg" },
            { en: "Can we only sympathize with those<br>whose experiences match our own?<br>I think we can connect with others<br>as long as we sincerely try<br>to understand them and soothe their pain.", image: "bg14.jpg" },
            { en: "Being considerate means<br>empathizing with others.", image: "bg15.jpg" },
            { en: "When something happens to<br>bring me down,I tell myself to snap out of it,<br>saying “There’s no use crying<br>over spilled milk!<br>I’ll be more careful and do better<br>next time.”", image: "bg16.jpg" },
            { en: "It’s important to consider<br>your own needs,<br>but more important to think of others.<br>The buddhas will look after you<br>when you try to be kind, warm,<br>supportive, and devoted to others.", image: "bg17.jpg" },
            { en: "Never forget that many people<br>have helped and loved you<br>since the day you were born.<br>Your life is important to your family,<br>your friends, and me.", image: "bg18.jpg" },
            { en: "No one is perfect.", image: "bg19.jpg" },
            { en: "Treat all things as if they are<br>alive and worthy of care.<br>The more you cherish everything<br>around you,<br>the more blessed your life will be.<br>Nature and the self,<br>objects and people — all are one.", image: "bg20.jpg" },
            { en: "We all find it difficult to<br>communicate at times.<br>Whenever this happens to you,<br>listen carefully to the other person<br>before giving your opinion.<br>It will help to bring you<br>closer together.", image: "bg21.jpg" },
            { en: "Everyone loves to be greeted<br>with a smile.<br>Giving someone a warm smile is also<br>an important aspect of Buddhist training.<br>It is a form of dana paramita.", image: "bg22.jpg" },
            { en: "When you try to do something good,<br>you may need to make a conscious<br>effort to follow through at first.<br>Eventually, however, it will become<br>a natural part of your behavior.<br>Then you can discover the beautiful<br>person within you.", image: "bg23.jpg" }
        ];

        // 🔗 GAS Web App URL
        const gasUrl = 'https://script.google.com/macros/s/AKfycbz27VJEIDm_tBf4iYYj5HYLsz7suTl1EXopg-vAhFeWoi1-aSanvAtIF3AZMTSmDv93/exec';

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        window.onload = function() {
            try {
                refreshQuote();
                sendAutoAccessLog(); // バックグラウンド自動アクセス送信
            } catch (error) {
                console.error("Initialization error:", error);
            }
        };

        function refreshQuote() {
            if (quotesData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            const selectedSet = quotesData[randomIndex];
            document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
            
            let htmlContent = "";
            if(selectedSet.en) htmlContent += `<div class="lang-block lang-english">${selectedSet.en}</div>`;
            document.getElementById("content-body").innerHTML = htmlContent;
        }

        // 📡 自動アクセスログ送信
        function sendAutoAccessLog() {
            const payload = { 
                type: "access", 
                lang: "en",       
                status: "Auto",   
                country: "Auto",  
                deviceId: getOrCreateDeviceId()
            };

            fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            })
            .catch((err) => { console.error("Auto log transmission failed:", err); });
        }

        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        // 📤 メッセージフォーム送信処理
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { 
                submitBtn.innerText = "Sending..."; 
                submitBtn.disabled = true; 
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData);
            
            payload.type = "message";
            payload.lang = "en"; 
            payload.status = "Auto";
            payload.country = "Auto";
            payload.deviceId = getOrCreateDeviceId();

            fetch(gasUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                alert("Your message has been sent.\nThank you.");
                form.reset();
                document.getElementById('message-form-container').style.display = 'none';
                const actionBtn = document.getElementById('action-btn');
                if (actionBtn) {
                    actionBtn.innerText = "💌 Sent";
                    actionBtn.style.display = 'inline-block';
                    actionBtn.disabled = true;
                    actionBtn.style.backgroundColor = "#ccc";
                    actionBtn.style.boxShadow = "none";
                }
            })
            .catch((error) => {
                alert("A connection error occurred. Please try again.");
                if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
