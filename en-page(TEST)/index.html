<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
        }
        #quote-container {
            background: rgba(255, 255, 255, 0.75);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 390px; 
            width: 100%;
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
        }
        .lang-block {
            margin-bottom: 0;
            line-height: 1.8;
        }
        .lang-english {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }
        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }
        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }

        /* 🌸 ポップアップ全体の背景を「外観.jpg」に設定 */
        #statusModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../外観.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* 🌈 枠線は半透明のシースルー虹色 */
        .modal-title {
            font-size: 22px; 
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: #2c3e50;
            line-height: 1.5;
            width: 95%;
            max-width: 365px;
            white-space: nowrap; 
            padding: 15px 10px;
            box-sizing: border-box;
            display: inline-block;
            border: 4px solid transparent;
            border-radius: 16px;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.3)), 
                linear-gradient(45deg, 
                    rgba(255, 51, 102, 0.4), 
                    rgba(255, 153, 51, 0.4), 
                    rgba(255, 255, 51, 0.4), 
                    rgba(51, 204, 102, 0.4), 
                    rgba(51, 153, 255, 0.4), 
                    rgba(153, 51, 255, 0.4)
                ); 
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        /* 🌍 国籍入力用ボックスのスタイル（うっすら白透かし） */
        .country-container {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            width: 95%;
            max-width: 365px;
            box-sizing: border-box;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .country-label {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            display: block;
            text-align: center;
        }
        .radio-option {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 16px;
            color: #333;
            cursor: pointer;
            font-weight: bold;
        }
        .radio-option input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .country-text-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            margin-top: 4px;
            display: none; 
        }
        
        .modal-btn-group {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }
        .modal-btn {
            flex: 1;
            padding: 22px 10px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .modal-btn:active { transform: scale(0.97); }
        .btn-member { background-color: #2ecc71; color: white; }
        .btn-nonmember { background-color: #7f8c8d; color: white; } 
    </style>
</head>
<body>

    <div id="statusModal">
        <div class="modal-title">Welcome to<br>MIZOU-SANPAI<br>🪷ーPlease Check Inー🪷</div>
        
        <div class="country-container">
            <span class="country-label" style="font-size: 22px; font-weight: bold; display: block; margin-bottom: 15px;">Where are you from?</span>
            <label class="radio-option">
                <input type="radio" name="countryOpt" value="Thailand" checked onclick="toggleCountryInput(false)">
                Thailand
            </label>
            <label class="radio-option">
                <input type="radio" name="countryOpt" value="Other" onclick="toggleCountryInput(true)">
                Other (Free Input)
            </label>
            <input type="text" id="customCountry" class="country-text-input" placeholder="Enter your country">
        </div>

        <div class="modal-btn-group">
            <button class="modal-btn btn-member" onclick="selectStatus('Member')">Member</button>
            <button class="modal-btn btn-nonmember" onclick="selectStatus('Visitor')">Visitor</button>
        </div>
    </div>

    <div id="quote-container">
        <div id="content-body">Loading...</div>
        <button id="action-btn" onclick="toggleForm()">💌 Message of Gratitude</button>
        <div id="message-form-container">
            <form id="thank-you-form" method="POST">
                <input type="text" name="bukai" placeholder="Division(Optional)">
                <input type="text" name="kei" placeholder="Lineage(Optional)">
                <input type="text" name="name" placeholder="Name (Optional)">
                <textarea name="message" rows="4" placeholder="Please enter your message..." required></textarea>
                <br>
                <button type="submit" id="submit-btn">Submit</button>
            </form>
        </div>
    </div>

    <script>
        const quotesData = [
            { en: "Always together. Always by your side.<br>That is Buddha. When you feel down, sad,<br>or lose confidence,<br>close your eyes and remember.<br>You are always with Buddha.", image: "bg1.jpg" },
            { en: "I came to know the \"heart\" of Buddha through your kindness. Thank you.", image: "bg2.jpg" },
            { en: "Communication is very important, whether through words or gestures.<br>\"Good morning,\" \"Hello\"<br><br>Let's start with a greeting.", image: "bg3.jpg" },
            { en: "It's wonderful that you felt motivated to do your best.<br>However, if you push yourself too hard suddenly,<br>you might get tired.<br>Don't overdo it, take it step by step.<br>Why not start with what you can do?", image: "bg4.jpg" },
            { en: "Buddha resides within everyone's<br>heart.<br>To be kind, to help, to be honest—<br>you have a little bit of that heart, don't you?<br>That \"little bit\" is a small Buddha.", image: "bg5.jpg" },
            { en: "A person who can reflect on themselves<br>has a beautiful heart.", image: "bg6.jpg" },
            { en: "Making your appearance neat and beautiful is<br>very good. In addition, if you add heartfelt<br>words and attitude,<br>you can become even more beautiful.", image: "bg7.jpg" },
            { en: "Cheerful, truthful, kind, warm—\"That person is so nice,\"<br>someone might say.<br>You surely have such good qualities too,<br>each of us has something special to offer.", image: "bg8.jpg" },
            { en: "Being able to desire to make an effort and improve yourself—<br>that itself is \"happiness.\"", image: "bg9.jpg" },
            { en: "Sometimes you just want to take a deep breath and say<br>\"Phew,\" don't you?<br>I do too. At times like that,<br>take a deep breath, fill your body with oxygen...<br><br>\"Now, let's do our best again.\"", image: "bg10.jpg" },
            { en: "A person you spend time with at a certain time and place<br>might be an important person Buddha brought into your life.", image: "bg11.jpg" },
            { en: "Every time you feel grateful,<br>your heart shines brighter.", image: "bg12.jpg" },
            { en: "Don't step back thinking,<br>\"I'm no good...\"<br>Buddha expects much from you just as you are. There is someone who needs you<br>just as you are.<br>Be forward-looking and think positively.<br><br>If you do your best, there is no need for regret.", image: "bg13.jpg" },
            { en: "Do we have to go through the same experience<br>to understand someone's feelings?<br>I don't think so.<br>As long as there is sincerity to ease suffering or sadness,<br>and to share it even a little, we can connect.", image: "bg14.jpg" },
            { en: "Compassion means<br>putting yourself in another person's heart.", image: "bg15.jpg" },
            { en: "I get depressed too.<br>But at times like that, I tell myself<br>to switch my mindset:<br>\"It can't be helped, it's already over.<br>Next time I'll be careful!\"", image: "bg16.jpg" },
            { en: "Thinking about yourself is important.<br>Thinking about others as your own matter<br>is even more important.<br>A person who is kind, warm, supportive,<br>and dedicated to others is cherished by Buddha.", image: "bg17.jpg" },
            { en: "Remember how many people have helped you and given you love<br>since you were born until now. Everyone's life is precious<br>to their family, their friends, and to me.", image: "bg18.jpg" },
            { en: "No one is perfect.", image: "bg19.jpg" },
            { en: "Cherish things. Everything has life.<br>If you cherish them, you will be protected by the things you cherished.<br>Nature and yourself, tools and people—<br>all are one.", image: "bg20.jpg" },
            { en: "Do we have to go through the same experience<br>to understand someone's feelings?<br>I don't think so.<br>As long as there is sincerity to ease suffering or sadness,<br>and to share it even a little, we can connect.", image: "bg21.jpg" },
            { en: "Welcoming others with a gentle, warm smile is called<br>\"Waganse\" (offering of a smiling face).<br>You would be happy to be welcomed with a smile, wouldn't you?<br>It is one of the important practices in Buddhism.", image: "bg22.jpg" },
            { en: "Doing good deeds may require conscious effort at first<br>to keep it going. As you keep telling yourself over and over,<br>doing good will naturally become a \"habit.\"<br>At that moment, you will find a wonderful version of yourself.", image: "bg23.jpg" }
        ];

        const gasUrl = 'https://script.google.com/macros/s/AKfycbxweFjx6iq_aeWHzVOkbvHTBVBrC4wcWZi1K6q7mu30Uol-8WFrJ93OoMNtYZ5nfHrF/exec';

        let selectedMemberStatus = "Unknown"; 
        let selectedCountry = "Thailand"; // 選択された国を保持する変数

        window.onload = function() {
            try {
                document.getElementById("statusModal").style.display = "flex";

                const randomIndex = Math.floor(Math.random() * quotesData.length);
                const selectedSet = quotesData[randomIndex];
                document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
                
                let htmlContent = "";
                if(selectedSet.en) htmlContent += `<div class="lang-block lang-english">${selectedSet.en}</div>`;
                document.getElementById("content-body").innerHTML = htmlContent;
            } catch (error) {
                alert("An error occurred while loading.");
            }
        };

        function toggleCountryInput(show) {
            const inputField = document.getElementById("customCountry");
            inputField.style.display = show ? "block" : "none";
            if(show) inputField.focus();
        }

        function selectStatus(statusValue) {
            selectedMemberStatus = statusValue; 
            
            // 国籍データの確定
            let finalCountry = "Thailand";
            const radioVal = document.querySelector('input[name="countryOpt"]:checked').value;
            if (radioVal === "Other") {
                const customVal = document.getElementById("customCountry").value.trim();
                finalCountry = customVal ? customVal : "Other";
            }
            selectedCountry = finalCountry; // メッセージ送信時にも使い回せるよう記憶

            document.getElementById("statusModal").style.display = "none";
            
            fetch(gasUrl, {
                method: 'POST',
                body: JSON.stringify({ 
                    type: "access", 
                    status: statusValue, 
                    country: finalCountry
                })
            })
            .catch((err) => { console.error("Transmission failed: ", err); });
        }

        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { submitBtn.innerText = "Sending..."; submitBtn.disabled = true; }

            const formData = new FormData(form);
            formData.append("type", "message"); 
            formData.append("status", selectedMemberStatus); 
            formData.append("country", selectedCountry); // ✅ メッセージ送信時にも国籍を付与！

            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch(gasUrl, { method: 'POST', body: json })
            .then(async (response) => {
                let res = await response.json();
                if (res.status === "success") {
                    alert("Your message of gratitude has been sent successfully.");
                    form.reset();
                    document.getElementById('message-form-container').style.display = 'none';
                    const actionBtn = document.getElementById('action-btn');
                    if (actionBtn) {
                        actionBtn.innerText = "💌 Sent";
                        actionBtn.style.display = 'inline-block';
                        actionBtn.disabled = true;
                        actionBtn.style.backgroundColor = "#ccc";
                        actionBtn.style.boxShadow = "none";
                    }
                } else {
                    alert("Failed to send: " + (res.message || "Unknown error"));
                    if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
                }
            })
            .catch((error) => {
                alert("A connection error occurred.");
                if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
