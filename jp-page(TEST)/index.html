<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Message</title>
    <style>
        /* 🌍 画面の中央に綺麗に配置 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: sans-serif;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📜 メインコンテナ */
        #quote-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 35px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 390px; 
            width: 100%;
            box-sizing: border-box;
            max-height: 85vh; 
            overflow-y: auto;
        }

        .lang-block {
            margin-bottom: 0;
            line-height: 1.8;
        }

        .lang-japanese {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        #action-btn {
            margin-top: 25px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0076ff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,255,0.3);
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }
        #action-btn:active { transform: scale(0.95); }

        #message-form-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
        }
        textarea { resize: vertical; margin-bottom: 15px; }
        
        #submit-btn {
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(16,185,129,0.3);
            transition: all 0.2s ease;
        }
        #submit-btn:active { transform: scale(0.95); background-color: #059669; }
    </style>
</head>
<body>

    <div id="quote-container">
        <div id="content-body">読み込み中...</div>
        
        <br>
        <button id="action-btn" onclick="toggleForm()">💌 感謝のメッセージを送る</button>
        
        <div id="message-form-container">
            <form id="thank-you-form" method="POST">
                <input type="text" name="bukai" placeholder="部会 (任意)">
                <input type="text" name="kei" placeholder="経 (任意)">
                <input type="text" name="name" placeholder="お名前 (任意)">
                <textarea name="message" rows="4" placeholder="感謝のメッセージをご記入ください..." required></textarea>
                <br>
                <button type="submit" id="submit-btn">送信する</button>
            </form>
        </div>
    </div>

    <script>
        // 🌸 聖句データ（23メッセージ）
        const quotesData = [
            { jp: "いつも一緒。いつもあなたのそばに。<br>それが仏さまです。落ち込んだり、悲しかったり、<br>自信をなくしたりした時は、<br>そっと目を閉じて思い出してください。<br>あなたはいつも仏さまと一緒です。", image: "bg1.jpg" },
            { jp: "あなたの優しさを通して、仏さまの「お心」に触れることができました。ありがとうございます。", image: "bg2.jpg" },
            { jp: "言葉であれ、身振りであれ、コミュニケーションはとても大切です。<br>「おはようございます」「こんにちは」<br><br>まずは挨拶からはじめましょう。", image: "bg3.jpg" },
            { jp: "「がんばろう」という気持ちになれたのは素晴らしいことです。<br>しかし、急に無理をしすぎると、<br>疲れてしまうかもしれません。<br>焦らず、一歩ずつ進んでいきましょう。<br>まずは自分にできることからはじめてみませんか？", image: "bg4.jpg" },
            { jp: "仏さまは、みんなの心の中に<br>いらっしゃいます。<br>優しくしたい、助けたい、正直でありたい――<br>あなたにもそんな心が少しはあるでしょう？<br>その「少しの心」が、小さな仏さまなのです。", image: "bg5.jpg" },
            { jp: "自分自身を振り返ることができる人は、<br>美しい心を持っています。", image: "bg6.jpg" },
            { jp: "身だしなみを整え、美しくすることは<br>とても良いことです。さらに、そこに心のこもった<br>言葉づかいや態度が加われば、<br>あなたをもっと美しくすることができます。", image: "bg7.jpg" },
            { jp: "明るく、素直で、優しく、温かい――「あの人は素敵な人だな」と、<br>誰かが言っているかもしれません。<br>あなたにもきっとそんな良いところがあります。<br>私たちはそれぞれ、特別な良さを持っているのです。", image: "bg8.jpg" },
            { jp: "「努力したい」「自分を高めたい」と思えること――<br>それ自体がすでに「幸せ」なのです。", image: "bg9.jpg" },
            { jp: "時には、深呼吸をして「ふぅ」と<br>一息つきたくなることもありますよね？<br>私にもあります。そんな時は、<br>深く息を吸って、体に酸素を満たしてあげましょう…<br><br>「さあ、またがんばろう」", image: "bg10.jpg" },
            { jp: "ある時間、ある場所で一緒に過ごす人は、<br>仏さまがあなたの人生に合わせてくださった、大切な人かもしれません。", image: "bg11.jpg" },
            { jp: "感謝の気持ちを持つたびに、<br>あなたの心はより輝きます。", image: "bg12.jpg" },
            { jp: "「自分なんてだめだ…」と<br>後ろを向かないでください。<br>仏さまは、ありのままのあなたに期待しています。ありのままのあなたを<br>必要としている人がいます。<br>前を向いて、ポジティブに考えましょう。<br><br>ベストを尽くしたのなら、後悔する必要はありません。", image: "bg13.jpg" },
            { jp: "相手の気持ちを理解するためには、<br>同じ経験をしなければならないのでしょうか？<br>私はそうは思いません。<br>苦しみや悲しみを和らげたい、<br>少しでも分かち合いたいという誠実な心があれば、私たちはつながることができます。", image: "bg14.jpg" },
            { jp: "思いやりとは、<br>相手の心に寄り添うことです。", image: "bg15.jpg" },
            { jp: "私だって落ち込むことはあります。<br>でも、そんな時は自分にこう言い聞かせて<br>気持ちを切り替えます。<br>「仕方がない、もう終わったことだ。<br>次は気をつけよう！」", image: "bg16.jpg" },
            { jp: "自分のことを考えるのも大切ですが、<br>相手のことを自分のこととして考えるのは<br>もっと大切です。<br>優しく、温かく、寄り添い、<br>誰かのために尽くせる人は、仏さまに大切にされます。", image: "bg17.jpg" },
            { jp: "生まれてから今日まで、どれほど多くの人があなたを助け、愛を注いでくれたかを思い出してください。みんなの命は、<br>家族にとっても、友人にとっても、そして私にとっても、かけがえのない大切なものです。", image: "bg18.jpg" },
            { jp: "完璧な人など、この世に一人もいません。", image: "bg19.jpg" },
            { jp: "モノを大切にしましょう。すべてのモノに命があります。<br>モノを大切にすれば、大切にされたモノがあなたを守ってくれます。<br>自然と自分、道具と人――<br>すべては一つにつながっています。", image: "bg20.jpg" },
            { jp: "相手の気持ちを理解するためには、<br>同じ経験をしなければならないのでしょうか？<br>私はそうは思いません。<br>苦しみや悲しみを和らげたい、<br>少しでも分かち合いたいという誠実な心があれば、私たちはつながることができます。", image: "bg21.jpg" },
            { jp: "穏やかで温かい笑顔で相手を迎えることを、<br>「和顔施（わがんせ）」と言います。<br>笑顔で迎えられたら、あなたも嬉しいでしょう？<br>これは仏教における大切な実践の一つです。", image: "bg22.jpg" },
            { jp: "良い行いをするには、最初は続けるために意識的な努力が必要かもしれません。何度も自分に言い聞かせているうちに、<br>良い行いは自然と「習慣」になります。<br>その瞬間、素晴らしい自分に出会うことができるでしょう。", image: "bg23.jpg" }
        ];

        // 🔗 GAS Web App URL (★作成したGASのWebアプリURLに差し替えてください★)
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxfmuXVHkcBb1pHo-JDUHjtHXku5Q38blRJHXHElUzcQ3g6RHELlkRUlPxEfikc8Kk8/exec';

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'dev_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        window.onload = function() {
            try {
                refreshQuote();
                sendAutoAccessLog(); // バックグラウンド自動アクセス送信
            } catch (error) {
                console.error("Initialization error:", error);
            }
        };

        function refreshQuote() {
            if (quotesData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * quotesData.length);
            const selectedSet = quotesData[randomIndex];
            document.body.style.backgroundImage = `url('../${selectedSet.image}')`;
            
            let htmlContent = "";
            if(selectedSet.jp) htmlContent += `<div class="lang-block lang-japanese">${selectedSet.jp}</div>`;
            document.getElementById("content-body").innerHTML = htmlContent;
        }

        // 📡 自動アクセスログ送信 (no-corsを取り除き、確実に1回だけカウント)
        function sendAutoAccessLog() {
            const payload = { 
                type: "access", 
                lang: "jp",       // 👈 GAS側のC列 (JP) にカウントを加算するため明示
                status: "Auto",   
                country: "Auto",  
                deviceId: getOrCreateDeviceId()
            };

            fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            })
            .catch((err) => { console.error("Auto log transmission failed:", err); });
        }

        function toggleForm() {
            document.getElementById('message-form-container').style.display = 'block';
            document.getElementById('action-btn').style.display = 'none';
        }

        // 📤 メッセージフォーム送信処理
        const form = document.getElementById('thank-you-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) { 
                submitBtn.innerText = "Sending..."; 
                submitBtn.disabled = true; // 送信ボタンを即時無効化（連打防止）
            }

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData);
            
            payload.type = "message";
            payload.lang = "jp"; // 👈 日本語のメッセージであることを指定
            payload.status = "Auto";
            payload.country = "Auto";
            payload.deviceId = getOrCreateDeviceId();

            fetch(gasUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                // 💡 ご希望に合わせ、ポップアップ言語は英語をキープ
                alert("Your message of gratitude has been sent. Thank you very much.");
                form.reset();
                document.getElementById('message-form-container').style.display = 'none';
                const actionBtn = document.getElementById('action-btn');
                if (actionBtn) {
                    actionBtn.innerText = "💌 Sent";
                    actionBtn.style.display = 'inline-block';
                    actionBtn.disabled = true;
                    actionBtn.style.backgroundColor = "#ccc";
                    actionBtn.style.boxShadow = "none";
                }
            })
            .catch((error) => {
                alert("A connection error occurred. Please try again.");
                if (submitBtn) { submitBtn.innerText = "Submit"; submitBtn.disabled = false; }
            });
        });
    </script>
</body>
</html>
